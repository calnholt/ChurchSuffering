name: Build and publish to itch.io
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: windows-latest
    env:
      ITCH_USER: "calnholt"
      ITCH_GAME: "crusader-30xx"
      CHANNEL: "windows"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------
      # READ + INCREMENT VERSION
      # ----------------------------
      - name: Read version
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content VERSION).Trim()
          "current_version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Increment patch version
        id: bump
        shell: bash
        run: |
          VER=${{ steps.version.outputs.current_version }}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VER"
          PATCH=$((PATCH + 1))
          NEW_VER="$MAJOR.$MINOR.$PATCH"
          echo "$NEW_VER" > VERSION
          echo "new_version=$NEW_VER" >> $GITHUB_OUTPUT

      - name: Commit updated version
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add VERSION
          git commit -m "Bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

      # ----------------------------
      # BUILD GAME
      # ----------------------------
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore Crusaders30XX.csproj

      - name: Publish self-contained Windows build
        run: dotnet publish Crusaders30XX.csproj -c Release -r win-x64 --self-contained true -o ./artifacts/windows

      # ----------------------------
      # BUTLER UPLOAD
      # ----------------------------
      - name: Setup butler
        uses: remarkablegames/setup-butler@v2

      - name: Upload to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        shell: bash
        run: |
          butler push ./artifacts/windows $ITCH_USER/$ITCH_GAME:$CHANNEL \
            --userversion ${{ steps.bump.outputs.new_version }}

      - name: Verify itch.io build
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED="${{ steps.bump.outputs.new_version }}"
          TARGET="${ITCH_USER}/${ITCH_GAME}:${CHANNEL}"
          WHARF_URL="https://api.itch.io/wharf/latest?target=${ITCH_USER}/${ITCH_GAME}&channel_name=${CHANNEL}"

          echo "Butler channel status:"
          butler status "$TARGET"

          echo "Polling wharf/latest for userversion ${EXPECTED} (up to 30 minutes)..."
          for i in $(seq 1 60); do
            HTTP_CODE=$(curl -s -o /tmp/wharf.json -w "%{http_code}" "$WHARF_URL" || true)
            if [ "$HTTP_CODE" = "200" ]; then
              LATEST=$(grep -o '"latest"[[:space:]]*:[[:space:]]*"[^"]*"' /tmp/wharf.json | head -1 | sed 's/.*"\([^"]*\)"$/\1/')
              echo "Attempt ${i}/60: latest=${LATEST:-<none>}"
              if [ "${LATEST:-}" = "$EXPECTED" ]; then
                echo "Build is live with userversion ${EXPECTED}"
                exit 0
              fi
            else
              echo "Attempt ${i}/60: wharf/latest HTTP ${HTTP_CODE}"
            fi
            sleep 30
          done

          echo "Build did not become live with userversion ${EXPECTED} within 30 minutes"
          butler status "$TARGET"
          exit 1
