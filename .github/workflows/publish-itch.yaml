name: Build and publish to itch.io
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: version
        shell: bash
        run: |
          VER=$(tr -d '[:space:]' < VERSION)
          echo "current_version=$VER" >> $GITHUB_OUTPUT

      - name: Increment patch version
        id: bump
        shell: bash
        run: |
          VER=${{ steps.version.outputs.current_version }}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VER"
          PATCH=$((PATCH + 1))
          NEW_VER="$MAJOR.$MINOR.$PATCH"
          echo "$NEW_VER" > VERSION
          echo "new_version=$NEW_VER" >> $GITHUB_OUTPUT

      - name: Commit updated version
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add VERSION
          git commit -m "Bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

  build-content:
    needs: bump-version
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Pull latest version bump
        run: git pull origin main

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore Crusaders30XX.csproj

      - name: Build MonoGame content (native MGFXC)
        run: dotnet build Crusaders30XX.csproj -c Release --no-restore

      - name: Upload content artifact
        uses: actions/upload-artifact@v4
        with:
          name: monogame-content
          path: Content/bin/DesktopGL
          retention-days: 1

  build-windows:
    needs: [bump-version, build-content]
    runs-on: windows-latest
    env:
      ITCH_USER: "calnholt"
      ITCH_GAME: "church-suffering"
      CHANNEL: "windows"
      VERSION: ${{ needs.bump-version.outputs.new_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Pull latest version bump
        run: git pull origin main

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore Crusaders30XX.csproj

      - name: Download prebuilt MonoGame content
        uses: actions/download-artifact@v4
        with:
          name: monogame-content
          path: Content/bin/DesktopGL

      - name: Publish self-contained Windows build
        run: dotnet publish Crusaders30XX.csproj -c Release -r win-x64 --self-contained true -o ./artifacts/windows -p:SkipMonoGameContentPipeline=true

      - name: Setup butler
        uses: remarkablegames/setup-butler@v2

      - name: Upload to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        shell: bash
        run: |
          butler push ./artifacts/windows $ITCH_USER/$ITCH_GAME:$CHANNEL \
            --userversion $VERSION

      - name: Verify itch.io build
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED="$VERSION"
          TARGET="${ITCH_USER}/${ITCH_GAME}:${CHANNEL}"
          WHARF_URL="https://api.itch.io/wharf/latest?target=${ITCH_USER}/${ITCH_GAME}&channel_name=${CHANNEL}"

          echo "Butler channel status:"
          butler status "$TARGET"

          echo "Polling wharf/latest for userversion ${EXPECTED} (up to 30 minutes)..."
          for i in $(seq 1 60); do
            HTTP_CODE=$(curl -s -o /tmp/wharf.json -w "%{http_code}" "$WHARF_URL" || true)
            if [ "$HTTP_CODE" = "200" ]; then
              LATEST=$(grep -o '"latest"[[:space:]]*:[[:space:]]*"[^"]*"' /tmp/wharf.json | head -1 | sed 's/.*"\([^"]*\)"$/\1/')
              echo "Attempt ${i}/60: latest=${LATEST:-<none>}"
              if [ "${LATEST:-}" = "$EXPECTED" ]; then
                echo "Build is live with userversion ${EXPECTED}"
                exit 0
              fi
            else
              echo "Attempt ${i}/60: wharf/latest HTTP ${HTTP_CODE}"
            fi
            sleep 30
          done

          echo "Build did not become live with userversion ${EXPECTED} within 30 minutes"
          butler status "$TARGET"
          exit 1

  build-macos:
    needs: [bump-version, build-content]
    runs-on: macos-latest
    env:
      ITCH_USER: "calnholt"
      ITCH_GAME: "church-suffering"
      VERSION: ${{ needs.bump-version.outputs.new_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Pull latest version bump
        run: git pull origin main

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore Crusaders30XX.csproj

      - name: Download prebuilt MonoGame content
        uses: actions/download-artifact@v4
        with:
          name: monogame-content
          path: Content/bin/DesktopGL

      - name: Publish Apple Silicon build
        run: |
          dotnet publish Crusaders30XX.csproj -c Release -r osx-arm64 --self-contained true -o ./artifacts/mac-apple-silicon -p:SkipMonoGameContentPipeline=true
          chmod +x ./artifacts/mac-apple-silicon/Crusaders30XX
          (cd ./artifacts/mac-apple-silicon && zip -r ../Crusaders30XX-mac-apple-silicon.zip .)

      - name: Publish Intel Mac build
        run: |
          dotnet publish Crusaders30XX.csproj -c Release -r osx-x64 --self-contained true -o ./artifacts/mac-intel -p:SkipMonoGameContentPipeline=true
          chmod +x ./artifacts/mac-intel/Crusaders30XX
          (cd ./artifacts/mac-intel && zip -r ../Crusaders30XX-mac-intel.zip .)

      - name: Setup butler
        uses: remarkablegames/setup-butler@v2

      - name: Upload Mac builds to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        shell: bash
        run: |
          butler push ./artifacts/mac-apple-silicon $ITCH_USER/$ITCH_GAME:mac-apple-silicon \
            --userversion $VERSION
          butler push ./artifacts/mac-intel $ITCH_USER/$ITCH_GAME:mac-intel \
            --userversion $VERSION

      - name: Verify itch.io Mac builds
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED="$VERSION"

          verify_channel() {
            local CHANNEL="$1"
            local TARGET="${ITCH_USER}/${ITCH_GAME}:${CHANNEL}"
            local WHARF_URL="https://api.itch.io/wharf/latest?target=${ITCH_USER}/${ITCH_GAME}&channel_name=${CHANNEL}"

            echo "Butler channel status for ${CHANNEL}:"
            butler status "$TARGET"

            echo "Polling wharf/latest for ${CHANNEL} userversion ${EXPECTED} (up to 30 minutes)..."
            for i in $(seq 1 60); do
              HTTP_CODE=$(curl -s -o /tmp/wharf.json -w "%{http_code}" "$WHARF_URL" || true)
              if [ "$HTTP_CODE" = "200" ]; then
                LATEST=$(grep -o '"latest"[[:space:]]*:[[:space:]]*"[^"]*"' /tmp/wharf.json | head -1 | sed 's/.*"\([^"]*\)"$/\1/')
                echo "Attempt ${i}/60: latest=${LATEST:-<none>}"
                if [ "${LATEST:-}" = "$EXPECTED" ]; then
                  echo "Build is live on ${CHANNEL} with userversion ${EXPECTED}"
                  return 0
                fi
              else
                echo "Attempt ${i}/60: wharf/latest HTTP ${HTTP_CODE}"
              fi
              sleep 30
            done

            echo "Build did not become live on ${CHANNEL} with userversion ${EXPECTED} within 30 minutes"
            butler status "$TARGET"
            return 1
          }

          verify_channel mac-apple-silicon
          verify_channel mac-intel
