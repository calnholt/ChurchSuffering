<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crusaders30XX — Way Station Climb Setup: Penances</title>
<style>
  /*
    Redesign exploration for WayStationClimbSettingsModalSystem.cs.

    MonoGame notes (1920x1080 virtual; page chrome not shipped):
    - Replaces the Easy/Normal/Hard difficulty selector with Slay-the-Spire-style
      "Penances". The unlock order is a fixed 24-entry sequence shared by every
      weapon; each weapon persists its own highest unlocked penance level
      (e.g. WayStationMetaSave.HighestPenance[weaponId]).
    - Selecting a weapon clamps/restores that weapon's remembered penance level.
    - Clicking a penance node selects that level; clicking the currently lit
      node steps back down one (level 0 = no penance).
    - Tooltips use the standard rounded-black/white-text container from
      TooltipTextDisplaySystem.cs (8px radius, 8px padding).
    - Background: Content/waystation.png, dimmed. All chrome is
      primitive-friendly (rects, lines, diamonds, circles, text, simple SVG
      glyphs that can become small textures).
    - Variant B "Stations of the Ascent": fullscreen overlay; weapon cards on
      top, horizontal diamond station track, tally chips below.
  */
  @font-face {
    font-family: "New Rocker";
    src: url("../Content/Fonts/NewRocker.ttf") format("truetype");
  }
  @font-face {
    font-family: "Chakra Petch";
    src: url("../Content/Fonts/ChakraPetch.ttf") format("truetype");
    font-weight: 400 700;
  }
  @font-face {
    font-family: "Grenze";
    src: url("../Content/Fonts/Grenze.ttf") format("truetype");
  }

  :root {
    --ink: #050606;
    --charcoal: #101112;
    --iron: #242628;
    --bone: #eee9df;
    --bone-dim: #a8a399;
    --ash: #6f6b64;
    --blood: #c41e3a;
    --blood-dim: #7c1226;
    --blood-dark: #3a0812;
    --gold: #e8c45d;
    --game-w: 1920px;
    --game-h: 1080px;
    --ease-rise: cubic-bezier(0.16, 1, 0.3, 1);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body {
    background: #070809;
    color: var(--bone);
    font-family: "Chakra Petch", sans-serif;
  }
  button { font: inherit; }

  /* ---------- page chrome (not shipped) ---------- */
  .page-header {
    padding: 24px 36px 22px;
    background: #0b0c0d;
    border-bottom: 1px solid #2a2c2e;
  }
  .page-title {
    margin: 0 0 6px;
    font: 34px/1 "New Rocker", serif;
    letter-spacing: 2px;
  }
  .page-description {
    max-width: 900px;
    min-height: 42px;
    margin: 0;
    color: #aaa;
    font-size: 14px;
    line-height: 1.45;
  }
  .page-main { padding: 28px 36px 54px; }
  .viewport-scaler {
    position: relative;
    width: min(100%, 1440px);
    min-height: 360px;
    margin: 0 auto;
    overflow: hidden;
    background: #111;
    border: 1px solid #303234;
    box-shadow: 0 28px 90px #000;
  }
  .viewport {
    position: absolute;
    top: 0;
    left: 50%;
    width: var(--game-w);
    height: var(--game-h);
    overflow: hidden;
    transform-origin: top center;
  }

  /* ---------- shared scene ---------- */
  .bg-scene {
    position: absolute;
    inset: 0;
    background: url("../Content/waystation.png") center / cover no-repeat;
    filter: saturate(.62) contrast(1.05);
    transform: scale(1.02);
  }
  .scene-dim {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 42%, transparent 0 24%, rgba(0, 0, 0, .5) 74%, rgba(0, 0, 0, .9) 100%),
      linear-gradient(180deg, rgba(0, 0, 0, .78) 0, rgba(0, 0, 0, .42) 18%, rgba(0, 0, 0, .46) 80%, rgba(0, 0, 0, .86) 100%);
  }
  .grain {
    position: absolute;
    inset: 0;
    opacity: .12;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.45'/%3E%3C/svg%3E");
    mix-blend-mode: soft-light;
  }

  .variant-root {
    position: absolute;
    inset: 0;
  }

  /* ---------- shared overlay chrome ---------- */
  .masthead {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .masthead h2 {
    margin: 0;
    color: #fff;
    font: 52px/.95 "New Rocker", serif;
    letter-spacing: 4px;
    text-shadow: 0 4px 22px #000;
  }
  .masthead-rule {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-top: 14px;
  }
  .masthead-rule::before,
  .masthead-rule::after {
    content: "";
    width: 90px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--blood));
  }
  .masthead-rule::after { transform: scaleX(-1); }
  .masthead-rule span {
    width: 7px;
    height: 7px;
    rotate: 45deg;
    background: var(--blood);
    box-shadow: 0 0 12px rgba(196, 30, 58, .75);
  }

  .close-x {
    position: absolute;
    z-index: 30;
    top: 26px;
    right: 30px;
    display: grid;
    place-items: center;
    width: 46px;
    height: 46px;
    border: 1px solid rgba(255, 255, 255, .4);
    background: rgba(6, 6, 6, .68);
    color: var(--bone);
    font: 20px/1 "New Rocker", serif;
    cursor: pointer;
  }
  .close-x:hover { border-color: var(--blood); color: #fff; background: rgba(60, 8, 18, .6); }

  .depart-btn {
    position: relative;
    height: 64px;
    padding: 0 66px;
    border: 1px solid rgba(255, 255, 255, .55);
    background: linear-gradient(180deg, rgba(24, 24, 26, .92), rgba(8, 8, 9, .92));
    color: #fff;
    font: 27px/1 "New Rocker", serif;
    letter-spacing: 3px;
    cursor: pointer;
    box-shadow: 0 12px 34px rgba(0, 0, 0, .7);
    transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
  }
  .depart-btn::before,
  .depart-btn::after {
    content: "";
    position: absolute;
    top: 50%;
    width: 34px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(196, 30, 58, .9));
  }
  .depart-btn::before { left: 16px; }
  .depart-btn::after { right: 16px; transform: scaleX(-1); }
  .depart-btn:hover {
    border-color: var(--blood);
    background: linear-gradient(180deg, rgba(84, 12, 24, .94), rgba(26, 4, 8, .94));
    box-shadow: 0 0 0 1px rgba(196, 30, 58, .35), 0 0 34px rgba(196, 30, 58, .3), 0 12px 34px rgba(0, 0, 0, .7);
  }
  .footer-sub {
    color: var(--bone-dim);
    font-size: 12px;
    letter-spacing: 1.6px;
    text-transform: uppercase;
  }
  .footer-sub b { color: var(--bone); }

  /* ---------- shared penance tally ---------- */
  .tally-empty {
    padding: 14px 4px;
    color: var(--bone-dim);
    font-size: 13px;
    font-style: italic;
    letter-spacing: .4px;
    text-align: center;
  }

  /* ---------- tooltip (matches TooltipTextDisplaySystem) ---------- */
  .tooltip {
    position: absolute;
    z-index: 90;
    max-width: 340px;
    padding: 9px 12px;
    border-radius: 8px;
    background: rgba(0, 0, 0, .93);
    color: #fff;
    font-size: 14px;
    line-height: 1.4;
    pointer-events: none;
    opacity: 0;
    transition: opacity .1s ease;
  }
  .tooltip.is-visible { opacity: 1; }
  .tooltip b { display: block; margin-bottom: 2px; letter-spacing: .5px; }
  .tooltip .tip-muted { color: #b9b4ab; }

  /* =============================================================
     VARIANT B — "Stations of the Ascent" (fullscreen, horizontal)
     ============================================================= */
  .b-layout {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-rows: 150px 380px 1fr 108px;
    padding: 26px 90px 24px;
  }
  .b-weapons {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 30px;
  }
  .b-weapon {
    position: relative;
    width: 250px;
    height: 330px;
    padding: 0;
    border: 1px solid rgba(255, 255, 255, .24);
    background: linear-gradient(180deg, rgba(14, 14, 15, .9), rgba(7, 7, 8, .78));
    color: var(--bone);
    cursor: pointer;
    overflow: hidden;
    transition: border-color .16s ease, box-shadow .16s ease;
  }
  .b-weapon:hover { border-color: rgba(255, 255, 255, .7); }
  .b-weapon.is-selected {
    border-color: var(--blood);
    box-shadow: 0 0 0 1px rgba(196, 30, 58, .4), 0 0 36px rgba(196, 30, 58, .3);
  }
  .b-weapon.is-selected::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 100%, rgba(196, 30, 58, .3), transparent 66%);
  }
  .b-weapon img {
    position: relative;
    width: 100%;
    height: 216px;
    margin-top: 14px;
    object-fit: contain;
    filter: drop-shadow(0 8px 14px rgba(0, 0, 0, .65));
  }
  .b-weapon .w-name {
    position: relative;
    display: block;
    margin-top: 6px;
    font: 27px/1 "New Rocker", serif;
    letter-spacing: 1.6px;
    color: #fff;
  }
  .b-weapon .w-record {
    position: relative;
    display: block;
    margin-top: 8px;
    color: var(--bone-dim);
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 2.4px;
    text-transform: uppercase;
  }
  .b-weapon .w-record b { color: var(--gold); font: 14px/1 "Grenze", serif; }

  .b-track-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    min-height: 0;
  }
  .b-track-label {
    display: flex;
    align-items: center;
    gap: 16px;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .b-track-label::before,
  .b-track-label::after {
    content: "";
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(196, 30, 58, .8));
  }
  .b-track-label::after { transform: scaleX(-1); }
  .b-track {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 17px;
    padding: 30px 34px;
    border: 1px solid rgba(255, 255, 255, .12);
    background: rgba(6, 6, 7, .6);
  }
  .b-track::before {
    content: "";
    position: absolute;
    left: 40px;
    right: 40px;
    top: 50%;
    height: 1px;
    background: rgba(255, 255, 255, .24);
  }
  .station-wrap {
    position: relative;
    width: 30px;
    height: 30px;
    flex: none;
  }
  .station {
    position: relative;
    z-index: 2;
    width: 30px;
    height: 30px;
    padding: 0;
    border: 1px solid rgba(255, 255, 255, .42);
    background: #121214;
    rotate: 45deg;
    cursor: pointer;
    transition: background .14s ease, border-color .14s ease, box-shadow .14s ease, scale .14s ease;
  }
  .station:hover { border-color: #fff; scale: 1.2; }
  .station.is-active {
    border-color: var(--blood);
    background: linear-gradient(135deg, #e4576f, var(--blood) 55%, var(--blood-dim));
    box-shadow: 0 0 10px rgba(196, 30, 58, .6);
  }
  .station.is-current {
    box-shadow: 0 0 0 4px rgba(196, 30, 58, .3), 0 0 20px rgba(196, 30, 58, .9);
    scale: 1.24;
  }
  .station.is-locked {
    border-color: rgba(255, 255, 255, .13);
    background: #0a0a0b;
    cursor: not-allowed;
  }
  .station.is-locked:hover { scale: 1; border-color: rgba(255, 255, 255, .22); }
  .station .st-num {
    position: absolute;
    left: 50%;
    top: 50%;
    translate: -50% -50%;
    rotate: -45deg;
    color: rgba(255, 255, 255, .88);
    font: 13px/1 "Grenze", serif;
    pointer-events: none;
  }
  .station.is-locked .st-num { color: rgba(255, 255, 255, .26); }
  .station-wrap .st-tick {
    position: absolute;
    left: 50%;
    top: calc(100% + 15px);
    translate: -50% 0;
    color: var(--ash);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    pointer-events: none;
  }

  .b-tally-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    min-height: 0;
  }
  .b-level-line {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }
  .b-level-line .lvl-name {
    color: #fff;
    font: 30px/1 "New Rocker", serif;
    letter-spacing: 2px;
  }
  .b-level-line .lvl-count {
    color: #fff;
    font-size: 12px;
    letter-spacing: 1.6px;
    text-transform: uppercase;
  }
  .b-tally {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    max-width: 1300px;
  }
  .b-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px 8px 10px;
    border: 1px solid rgba(196, 30, 58, .45);
    border-radius: 999px;
    background: rgba(30, 5, 10, .78);
  }
  .b-chip .glyph {
    display: grid;
    place-items: center;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(196, 30, 58, .5);
    color: #e8b9c1;
  }
  .b-chip .glyph svg { width: 17px; height: 17px; }
  .b-chip .t-name { color: var(--bone); font-size: 13px; font-weight: 700; letter-spacing: .6px; }
  .b-chip .t-count { color: #fff; font: 19px/1 "Grenze", serif; }
  .b-footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  @media (max-width: 850px) {
    .page-main { padding: 18px 12px 36px; }
  }
</style>
</head>
<body>
<header class="page-header">
  <div>
    <h1 class="page-title">Way Station — Begin the Climb</h1>
    <p class="page-description">Fullscreen overlay. Weapon cards preside over a horizontal track of 24 diamond stations. Lit stations are the burdens you will carry; hollow ones await, crossed ones are locked. The chip row totals the active penances.</p>
  </div>
</header>

<main class="page-main">
  <div class="viewport-scaler">
    <div class="viewport" id="viewport">
      <div class="bg-scene"></div>
      <div class="scene-dim"></div>
      <div class="grain"></div>

      <!-- Variant B: Stations of the Ascent -->
      <section class="variant-root" id="root-b" aria-label="Stations of the Ascent">
        <button class="close-x" type="button" aria-label="Close">X</button>
        <div class="b-layout">
          <header class="masthead">
            <h2>Begin the Climb</h2>
            <div class="masthead-rule" aria-hidden="true"><span></span></div>
          </header>
          <div class="b-weapons" id="b-weapons"></div>
          <div class="b-track-zone">
            <div class="b-track-label">The Stations of Penance</div>
            <div class="b-track" id="b-track"></div>
            <div class="b-tally-zone">
              <div class="b-level-line" id="b-level"></div>
              <div class="b-tally" id="b-tally"></div>
            </div>
          </div>
          <footer class="b-footer">
            <button class="depart-btn" type="button">Depart</button>
            <p class="footer-sub" id="b-footer-sub"></p>
          </footer>
        </div>
      </section>

      <div class="tooltip" id="tooltip" role="tooltip"></div>
    </div>
  </div>
</main>

<script>
  const GAME_W = 1920;
  const GAME_H = 1080;

  /* ---------------- data ---------------- */
  const PENANCE_TYPES = {
    fasting: {
      name: "Fasting",
      desc: "The Crusader begins the climb with 1 less max HP.",
      glyph: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20s-7-4.6-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 10c0 5.4-7 10-7 10Z"/><path d="M8.5 11h7"/></svg>`
    },
    mortification: {
      name: "Mortification",
      desc: "Enemies have 5% more HP.",
      glyph: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a7 7 0 0 0-7 7c0 3 1.6 4.6 3 5.6V19h8v-3.4c1.4-1 3-2.6 3-5.6a7 7 0 0 0-7-7Z"/><circle cx="9" cy="10.5" r="1" fill="currentColor" stroke="none"/><circle cx="15" cy="10.5" r="1" fill="currentColor" stroke="none"/><path d="M10.5 19v-2M13.5 19v-2"/></svg>`
    },
    abstinence: {
      name: "Abstinence",
      desc: "Begin each battle with 1 fewer starting resource.",
      glyph: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 4h12c0 5-2.6 7.5-6 7.5S6 9 6 4Z"/><path d="M12 11.5V19M8.5 19h7"/><path d="M4.5 2.5l15 17"/></svg>`
    },
    pilgrimage: {
      name: "Penitential Pilgrimage",
      desc: "The shop takes 1 additional climb to reset its wares.",
      glyph: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3c-2 1.4-2.6 3.4-1.6 5"/><path d="M14 8 8 21"/><circle cx="15.5" cy="4.5" r="1.9"/><path d="M17.5 21c.4-1.6-.2-2.6-1.4-2.9"/></svg>`
    },
    reparation: {
      name: "Reparation",
      desc: "1 starter card is replaced with a random card bearing a random negative modification.",
      glyph: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="6" y="3.5" width="12" height="17" rx="1.6"/><path d="M13.4 3.5 10.6 10l3.2 1.4-3 6.2"/></svg>`
    }
  };

  /* Fixed unlock order, identical for every weapon. */
  const PENANCE_ORDER = [
    "fasting", "reparation", "abstinence", "mortification",
    "fasting", "reparation", "abstinence", "mortification",
    "reparation", "pilgrimage", "fasting", "mortification",
    "reparation", "fasting", "reparation", "mortification",
    "abstinence", "reparation", "pilgrimage", "mortification",
    "reparation", "fasting", "reparation", "mortification"
  ];
  const MAX_PENANCE = PENANCE_ORDER.length; /* 24 */
  const TALLY_DISPLAY_ORDER = ["fasting", "mortification", "abstinence", "pilgrimage", "reparation"];

  const WEAPONS = [
    { id: "sword", name: "Sword", art: "../Content/CardArt/sword.png", highest: 5 },
    { id: "dagger", name: "Dagger", art: "../Content/CardArt/dagger.png", highest: 10 },
    { id: "hammer", name: "Hammer", art: "../Content/CardArt/hammer.png", highest: 12 }
  ];

  /* ---------------- state ---------------- */
  const state = {
    weapon: "dagger",
    /* Each weapon remembers its own chosen level; defaults to its highest unlocked. */
    chosen: Object.fromEntries(WEAPONS.map(w => [w.id, w.highest]))
  };

  const weaponById = id => WEAPONS.find(w => w.id === id);
  const currentWeapon = () => weaponById(state.weapon);
  const currentLevel = () => state.chosen[state.weapon];

  /* ---------------- helpers ---------------- */
  function toRoman(n) {
    if (n <= 0) return "0";
    const table = [[10, "X"], [9, "IX"], [5, "V"], [4, "IV"], [1, "I"]];
    let out = "";
    for (const [value, sym] of table) {
      while (n >= value) { out += sym; n -= value; }
    }
    return out;
  }

  function tallyCounts(level) {
    const counts = {};
    for (let i = 0; i < level; i++) {
      const key = PENANCE_ORDER[i];
      counts[key] = (counts[key] || 0) + 1;
    }
    return counts;
  }

  function levelTitle(level) {
    return level === 0 ? "Unburdened" : `Penance ${toRoman(level)}`;
  }

  function nodeTip(level) {
    const weapon = currentWeapon();
    const type = PENANCE_TYPES[PENANCE_ORDER[level - 1]];
    if (level > weapon.highest) {
      return `<b>Penance ${toRoman(level)} — Locked</b><span class="tip-muted">Conquer Penance ${toRoman(level - 1)} with the ${weapon.name} to unlock.</span>`;
    }
    return `<b>Penance ${toRoman(level)} — ${type.name}</b>${type.desc}`;
  }

  function typeTip(key, count) {
    const type = PENANCE_TYPES[key];
    return `<b>${type.name} ×${count}</b>${type.desc}${count > 1 ? ` <span class="tip-muted">(applied ${count} times)</span>` : ""}`;
  }

  function setLevel(level) {
    const max = currentWeapon().highest;
    state.chosen[state.weapon] = Math.max(0, Math.min(level, max));
    render();
  }

  function onNodeClick(level) {
    if (level > currentWeapon().highest) return;
    setLevel(level === currentLevel() ? level - 1 : level);
  }

  function selectWeapon(id) {
    state.weapon = id;
    const weapon = currentWeapon();
    state.chosen[id] = Math.min(state.chosen[id], weapon.highest);
    render();
  }

  /* ---------------- shared renderers ---------------- */
  function tallyRowsHtml(level, rowClass) {
    const counts = tallyCounts(level);
    const rows = TALLY_DISPLAY_ORDER.filter(key => counts[key]).map(key => `
      <div class="${rowClass}" data-tip='${typeTip(key, counts[key]).replace(/'/g, "&#39;")}'>
        <span class="glyph">${PENANCE_TYPES[key].glyph}</span>
        <span class="t-name">${PENANCE_TYPES[key].name}</span>
        <span class="t-count">×${counts[key]}</span>
      </div>`).join("");
    return rows || `<div class="tally-empty">No penance borne — an unburdened climb.</div>`;
  }

  function footerSubHtml(level) {
    const weapon = currentWeapon();
    return level === 0
      ? `Depart with the <b>${weapon.name}</b>, unburdened`
      : `Depart with the <b>${weapon.name}</b> under <b>Penance ${toRoman(level)}</b>`;
  }

  /* ---------------- render ---------------- */
  function render() {
    const level = currentLevel();
    const weapon = currentWeapon();

    document.getElementById("b-weapons").innerHTML = WEAPONS.map(w => `
      <button class="b-weapon${w.id === state.weapon ? " is-selected" : ""}" type="button"
        data-weapon="${w.id}">
        <img src="${w.art}" alt="">
        <span class="w-name">${w.name}</span>
        <span class="w-record">Best Penance <b>${w.highest === 0 ? "—" : toRoman(w.highest)}</b></span>
      </button>`).join("");

    document.getElementById("b-track").innerHTML = Array.from({ length: MAX_PENANCE }, (_, i) => {
      const lvl = i + 1;
      const classes = ["station"];
      if (lvl <= level) classes.push("is-active");
      if (lvl === level) classes.push("is-current");
      if (lvl > weapon.highest) classes.push("is-locked");
      const tick = lvl % 6 === 0 ? `<span class="st-tick">${toRoman(lvl)}</span>` : "";
      return `<div class="station-wrap">
        <button class="${classes.join(" ")}" type="button" data-level="${lvl}"
          data-tip='${nodeTip(lvl).replace(/'/g, "&#39;")}' aria-label="Penance ${lvl}">
          <span class="st-num">${lvl}</span>
        </button>${tick}
      </div>`;
    }).join("");

    document.getElementById("b-level").innerHTML = `
      <span class="lvl-name">${levelTitle(level)}</span>
      <span class="lvl-count">${level} of ${MAX_PENANCE} burdens borne</span>`;
    document.getElementById("b-tally").innerHTML = tallyRowsHtml(level, "b-chip");
    document.getElementById("b-footer-sub").innerHTML = footerSubHtml(level);
    hideTooltip();
  }

  const viewport = document.getElementById("viewport");
  viewport.addEventListener("click", event => {
    const weaponBtn = event.target.closest("[data-weapon]");
    if (weaponBtn) { selectWeapon(weaponBtn.dataset.weapon); return; }
    const node = event.target.closest("[data-level]");
    if (node) onNodeClick(Number(node.dataset.level));
  });

  window.addEventListener("keydown", event => {
    if (event.key === "ArrowUp" || event.key === "ArrowRight") setLevel(currentLevel() + 1);
    if (event.key === "ArrowDown" || event.key === "ArrowLeft") setLevel(currentLevel() - 1);
    if (event.key === "1") selectWeapon("sword");
    if (event.key === "2") selectWeapon("dagger");
    if (event.key === "3") selectWeapon("hammer");
  });

  /* ---------------- tooltip ---------------- */
  const tooltip = document.getElementById("tooltip");
  let viewScale = 1;

  function hideTooltip() { tooltip.classList.remove("is-visible"); }

  function showTooltip(target) {
    const html = target.dataset.tip;
    if (!html) return;
    tooltip.innerHTML = html;
    tooltip.classList.add("is-visible");

    const vpRect = viewport.getBoundingClientRect();
    const rect = target.getBoundingClientRect();
    const x = (rect.left + rect.width / 2 - vpRect.left) / viewScale;
    const yTop = (rect.top - vpRect.top) / viewScale;
    const yBottom = (rect.bottom - vpRect.top) / viewScale;

    const tw = tooltip.offsetWidth;
    const th = tooltip.offsetHeight;
    let left = Math.max(12, Math.min(x - tw / 2, GAME_W - tw - 12));
    let top = yTop - th - 14;
    if (top < 12) top = yBottom + 14;
    tooltip.style.left = `${left}px`;
    tooltip.style.top = `${top}px`;
  }

  viewport.addEventListener("mouseover", event => {
    const target = event.target.closest("[data-tip]");
    if (target) showTooltip(target);
    else hideTooltip();
  });
  viewport.addEventListener("mouseleave", hideTooltip);

  /* ---------------- viewport scaling ---------------- */
  function fitViewport() {
    const scaler = document.querySelector(".viewport-scaler");
    viewScale = scaler.clientWidth / GAME_W;
    viewport.style.transform = `translateX(-50%) scale(${viewScale})`;
    scaler.style.height = `${GAME_H * viewScale}px`;
  }
  window.addEventListener("resize", fitViewport);
  window.addEventListener("load", fitViewport);

  render();
  fitViewport();
</script>
</body>
</html>
