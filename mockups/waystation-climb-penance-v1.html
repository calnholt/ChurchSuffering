<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crusaders30XX — Way Station Climb Setup: Penances</title>
<style>
  /*
    Redesign exploration for WayStationClimbSettingsModalSystem.cs.

    MonoGame notes (1920x1080 virtual; page chrome not shipped):
    - Replaces the Easy/Normal/Hard difficulty selector with Slay-the-Spire-style
      "Penances". The unlock order is a fixed 24-entry sequence shared by every
      weapon; each weapon persists its own highest unlocked penance level
      (e.g. WayStationMetaSave.HighestPenance[weaponId]).
    - Selecting a weapon clamps/restores that weapon's remembered penance level.
    - Clicking a penance node selects that level; clicking the currently lit
      node steps back down one (level 0 = no penance).
    - Tooltips use the standard rounded-black/white-text container from
      TooltipTextDisplaySystem.cs (8px radius, 8px padding).
    - Background: Content/waystation.png, dimmed. All chrome is
      primitive-friendly (rects, lines, diamonds, circles, text, simple SVG
      glyphs that can become small textures).
    - Variant A "The Rosary": fullscreen overlay; vertical bead chain climbing
      bottom-to-top (decade beads every 5), weapons stacked left, tally right.
    - Variant B "Stations of the Ascent": fullscreen overlay; weapon cards on
      top, horizontal diamond station track, tally chips below.
    - Variant C "The Penitent's Ledger": refined centered panel; compact weapon
      segments, big roman-numeral stepper, grouped penance ledger.
  */
  @font-face {
    font-family: "New Rocker";
    src: url("../Content/Fonts/NewRocker.ttf") format("truetype");
  }
  @font-face {
    font-family: "Chakra Petch";
    src: url("../Content/Fonts/ChakraPetch.ttf") format("truetype");
    font-weight: 400 700;
  }
  @font-face {
    font-family: "Grenze";
    src: url("../Content/Fonts/Grenze.ttf") format("truetype");
  }

  :root {
    --ink: #050606;
    --charcoal: #101112;
    --iron: #242628;
    --bone: #eee9df;
    --bone-dim: #a8a399;
    --ash: #6f6b64;
    --blood: #c41e3a;
    --blood-dim: #7c1226;
    --blood-dark: #3a0812;
    --gold: #e8c45d;
    --game-w: 1920px;
    --game-h: 1080px;
    --ease-rise: cubic-bezier(0.16, 1, 0.3, 1);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body {
    background: #070809;
    color: var(--bone);
    font-family: "Chakra Petch", sans-serif;
  }
  button { font: inherit; }

  /* ---------- page chrome (not shipped) ---------- */
  .page-header {
    display: grid;
    grid-template-columns: minmax(360px, 1fr) auto;
    gap: 28px;
    align-items: center;
    padding: 24px 36px 22px;
    background: #0b0c0d;
    border-bottom: 1px solid #2a2c2e;
  }
  .page-title {
    margin: 0 0 6px;
    font: 34px/1 "New Rocker", serif;
    letter-spacing: 2px;
  }
  .page-description {
    max-width: 900px;
    min-height: 42px;
    margin: 0;
    color: #aaa;
    font-size: 14px;
    line-height: 1.45;
  }
  .variant-controls { display: flex; gap: 8px; }
  .variant-chip {
    min-width: 150px;
    padding: 9px 12px;
    border: 1px solid #393c3e;
    background: #151719;
    color: #aaa;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .8px;
    text-transform: uppercase;
    cursor: pointer;
  }
  .variant-chip:hover { border-color: #777; color: #fff; }
  .variant-chip.is-active {
    border-color: var(--blood);
    background: rgba(124, 18, 38, .3);
    color: #fff;
  }
  .page-main { padding: 28px 36px 54px; }
  .viewport-scaler {
    position: relative;
    width: min(100%, 1440px);
    min-height: 360px;
    margin: 0 auto;
    overflow: hidden;
    background: #111;
    border: 1px solid #303234;
    box-shadow: 0 28px 90px #000;
  }
  .viewport {
    position: absolute;
    top: 0;
    left: 50%;
    width: var(--game-w);
    height: var(--game-h);
    overflow: hidden;
    transform-origin: top center;
  }

  /* ---------- shared scene ---------- */
  .bg-scene {
    position: absolute;
    inset: 0;
    background: url("../Content/waystation.png") center / cover no-repeat;
    filter: saturate(.62) contrast(1.05);
    transform: scale(1.02);
  }
  .scene-dim {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 42%, transparent 0 24%, rgba(0, 0, 0, .5) 74%, rgba(0, 0, 0, .9) 100%),
      linear-gradient(180deg, rgba(0, 0, 0, .78) 0, rgba(0, 0, 0, .42) 18%, rgba(0, 0, 0, .46) 80%, rgba(0, 0, 0, .86) 100%);
  }
  .grain {
    position: absolute;
    inset: 0;
    opacity: .12;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.45'/%3E%3C/svg%3E");
    mix-blend-mode: soft-light;
  }

  .variant-root {
    position: absolute;
    inset: 0;
    display: none;
  }
  .variant-root.is-active { display: block; }

  /* ---------- shared overlay chrome ---------- */
  .masthead {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .masthead .kicker {
    margin: 0 0 10px;
    color: var(--bone-dim);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
  }
  .masthead h2 {
    margin: 0;
    color: #fff;
    font: 52px/.95 "New Rocker", serif;
    letter-spacing: 4px;
    text-shadow: 0 4px 22px #000;
  }
  .masthead-rule {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-top: 14px;
  }
  .masthead-rule::before,
  .masthead-rule::after {
    content: "";
    width: 90px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--blood));
  }
  .masthead-rule::after { transform: scaleX(-1); }
  .masthead-rule span {
    width: 7px;
    height: 7px;
    rotate: 45deg;
    background: var(--blood);
    box-shadow: 0 0 12px rgba(196, 30, 58, .75);
  }

  .close-x {
    position: absolute;
    z-index: 30;
    top: 26px;
    right: 30px;
    display: grid;
    place-items: center;
    width: 46px;
    height: 46px;
    border: 1px solid rgba(255, 255, 255, .4);
    background: rgba(6, 6, 6, .68);
    color: var(--bone);
    font: 20px/1 "New Rocker", serif;
    cursor: pointer;
  }
  .close-x:hover { border-color: var(--blood); color: #fff; background: rgba(60, 8, 18, .6); }

  .depart-btn {
    position: relative;
    height: 64px;
    padding: 0 66px;
    border: 1px solid rgba(255, 255, 255, .55);
    background: linear-gradient(180deg, rgba(24, 24, 26, .92), rgba(8, 8, 9, .92));
    color: #fff;
    font: 27px/1 "New Rocker", serif;
    letter-spacing: 3px;
    cursor: pointer;
    box-shadow: 0 12px 34px rgba(0, 0, 0, .7);
    transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
  }
  .depart-btn::before,
  .depart-btn::after {
    content: "";
    position: absolute;
    top: 50%;
    width: 34px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(196, 30, 58, .9));
  }
  .depart-btn::before { left: 16px; }
  .depart-btn::after { right: 16px; transform: scaleX(-1); }
  .depart-btn:hover {
    border-color: var(--blood);
    background: linear-gradient(180deg, rgba(84, 12, 24, .94), rgba(26, 4, 8, .94));
    box-shadow: 0 0 0 1px rgba(196, 30, 58, .35), 0 0 34px rgba(196, 30, 58, .3), 0 12px 34px rgba(0, 0, 0, .7);
  }
  .footer-sub {
    color: var(--bone-dim);
    font-size: 12px;
    letter-spacing: 1.6px;
    text-transform: uppercase;
  }
  .footer-sub b { color: var(--bone); }

  /* ---------- shared penance tally ---------- */
  .tally-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 12px;
    border: 1px solid rgba(255, 255, 255, .1);
    background: rgba(8, 8, 9, .66);
  }
  .tally-row .glyph {
    display: grid;
    place-items: center;
    width: 34px;
    height: 34px;
    border: 1px solid rgba(196, 30, 58, .5);
    background: rgba(58, 8, 18, .5);
    color: #e8b9c1;
    flex: none;
  }
  .tally-row .glyph svg { width: 20px; height: 20px; }
  .tally-row .t-name {
    flex: 1;
    color: var(--bone);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: .8px;
  }
  .tally-row .t-count {
    color: #fff;
    font: 22px/1 "Grenze", serif;
  }
  .tally-row .t-count small { color: var(--bone-dim); font-size: 12px; }
  .tally-empty {
    padding: 14px 4px;
    color: var(--bone-dim);
    font-size: 13px;
    font-style: italic;
    letter-spacing: .4px;
    text-align: center;
  }

  /* ---------- tooltip (matches TooltipTextDisplaySystem) ---------- */
  .tooltip {
    position: absolute;
    z-index: 90;
    max-width: 340px;
    padding: 9px 12px;
    border-radius: 8px;
    background: rgba(0, 0, 0, .93);
    color: #fff;
    font-size: 14px;
    line-height: 1.4;
    pointer-events: none;
    opacity: 0;
    transition: opacity .1s ease;
  }
  .tooltip.is-visible { opacity: 1; }
  .tooltip b { display: block; margin-bottom: 2px; letter-spacing: .5px; }
  .tooltip .tip-muted { color: #b9b4ab; }

  /* =============================================================
     VARIANT A — "The Rosary" (fullscreen, vertical bead chain)
     ============================================================= */
  .a-layout {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-rows: 168px 1fr 104px;
    padding: 30px 120px 26px;
  }
  .a-body {
    display: grid;
    grid-template-columns: 470px 240px 470px;
    justify-content: center;
    gap: 60px;
    min-height: 0;
  }

  .a-weapons {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 18px;
  }
  .a-weapon {
    position: relative;
    display: grid;
    grid-template-columns: 120px 1fr auto;
    align-items: center;
    gap: 16px;
    height: 158px;
    padding: 0 22px 0 10px;
    border: 1px solid rgba(255, 255, 255, .22);
    background: linear-gradient(90deg, rgba(10, 10, 11, .88), rgba(10, 10, 11, .6));
    color: var(--bone);
    text-align: left;
    cursor: pointer;
    transition: border-color .16s ease, background .16s ease, box-shadow .16s ease;
  }
  .a-weapon::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: transparent;
    transition: background .16s ease;
  }
  .a-weapon:hover { border-color: rgba(255, 255, 255, .6); }
  .a-weapon.is-selected {
    border-color: var(--blood);
    background: linear-gradient(90deg, rgba(64, 9, 19, .88), rgba(20, 5, 8, .72));
    box-shadow: 0 0 0 1px rgba(196, 30, 58, .3), 0 0 30px rgba(196, 30, 58, .22);
  }
  .a-weapon.is-selected::before { background: var(--blood); }
  .a-weapon img {
    width: 120px;
    height: 138px;
    object-fit: contain;
    filter: drop-shadow(0 6px 10px rgba(0, 0, 0, .6)) saturate(.85);
  }
  .a-weapon .w-name {
    display: block;
    font: 30px/1 "New Rocker", serif;
    letter-spacing: 1.5px;
    color: #fff;
  }
  .a-weapon .w-record {
    display: block;
    margin-top: 9px;
    color: var(--bone-dim);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.2px;
    text-transform: uppercase;
  }
  .a-weapon .w-record b { color: var(--gold); font: 15px/1 "Grenze", serif; letter-spacing: 1px; }
  .a-weapon .w-pick {
    color: var(--blood);
    font: 30px/1 "Grenze", serif;
    opacity: 0;
    transition: opacity .16s ease;
  }
  .a-weapon.is-selected .w-pick { opacity: 1; }
  .a-weapons-label,
  .a-summary-label {
    margin: 0 0 14px;
    color: var(--bone-dim);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-align: center;
  }

  .a-chain-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 0;
  }
  .a-chain {
    position: relative;
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    justify-content: space-between;
    flex: 1;
    min-height: 0;
    padding: 4px 0;
  }
  .a-chain::before {
    content: "";
    position: absolute;
    top: 8px;
    bottom: 8px;
    width: 1px;
    background: linear-gradient(180deg, rgba(196, 30, 58, .0), rgba(255, 255, 255, .28) 12%, rgba(255, 255, 255, .28) 88%, rgba(196, 30, 58, 0));
  }
  .bead {
    position: relative;
    z-index: 2;
    width: 21px;
    height: 21px;
    padding: 0;
    border: 1px solid rgba(255, 255, 255, .42);
    border-radius: 50%;
    background: #121214;
    cursor: pointer;
    transition: background .14s ease, border-color .14s ease, box-shadow .14s ease, transform .14s ease;
  }
  .bead.is-decade { width: 28px; height: 28px; }
  .bead:hover { border-color: #fff; transform: scale(1.18); }
  .bead.is-active {
    border-color: var(--blood);
    background: radial-gradient(circle at 34% 30%, #e4576f, var(--blood) 52%, var(--blood-dim));
    box-shadow: 0 0 10px rgba(196, 30, 58, .65);
  }
  .bead.is-current {
    box-shadow: 0 0 0 4px rgba(196, 30, 58, .28), 0 0 18px rgba(196, 30, 58, .85);
    animation: bead-pulse 1.8s ease-in-out infinite;
  }
  .bead.is-locked {
    border-color: rgba(255, 255, 255, .14);
    background: #0a0a0b;
    cursor: not-allowed;
  }
  .bead.is-locked:hover { transform: none; border-color: rgba(255, 255, 255, .24); }
  .bead.is-locked::after {
    content: "";
    position: absolute;
    inset: 30%;
    border: 1px solid rgba(255, 255, 255, .22);
    border-radius: 1px;
    transform: rotate(45deg);
  }
  @keyframes bead-pulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(196, 30, 58, .28), 0 0 18px rgba(196, 30, 58, .85); }
    50% { box-shadow: 0 0 0 6px rgba(196, 30, 58, .16), 0 0 26px rgba(196, 30, 58, .6); }
  }
  .a-cross {
    position: relative;
    width: 30px;
    height: 40px;
    margin-top: 12px;
    flex: none;
  }
  .a-cross::before,
  .a-cross::after {
    content: "";
    position: absolute;
    background: linear-gradient(180deg, #d9d2c3, #8f897c);
    box-shadow: 0 2px 8px rgba(0, 0, 0, .8);
  }
  .a-cross::before { left: 12px; top: 0; width: 6px; height: 40px; }
  .a-cross::after { left: 0; top: 9px; width: 30px; height: 6px; }
  .a-chain-cap {
    margin-bottom: 8px;
    color: var(--bone-dim);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    flex: none;
  }

  .a-summary { display: flex; flex-direction: column; justify-content: center; }
  .a-summary-panel {
    padding: 22px 24px 20px;
    border: 1px solid rgba(255, 255, 255, .16);
    background: rgba(6, 6, 7, .78);
    box-shadow: 0 18px 44px rgba(0, 0, 0, .55);
  }
  .a-level-line {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 15px;
    border-bottom: 1px solid rgba(196, 30, 58, .35);
  }
  .a-level-line .lvl-name {
    color: #fff;
    font: 34px/1 "New Rocker", serif;
    letter-spacing: 2px;
  }
  .a-level-line .lvl-count {
    color: var(--bone-dim);
    font-size: 12px;
    letter-spacing: 1.6px;
    text-transform: uppercase;
  }
  .a-tally { display: flex; flex-direction: column; gap: 8px; }
  .a-next {
    margin-top: 14px;
    color: var(--ash);
    font-size: 11.5px;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
  }
  .a-next b { color: var(--bone-dim); }
  .a-footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  /* =============================================================
     VARIANT B — "Stations of the Ascent" (fullscreen, horizontal)
     ============================================================= */
  .b-layout {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-rows: 150px 380px 1fr 108px;
    padding: 26px 90px 24px;
  }
  .b-weapons {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 30px;
  }
  .b-weapon {
    position: relative;
    width: 250px;
    height: 330px;
    padding: 0;
    border: 1px solid rgba(255, 255, 255, .24);
    background: linear-gradient(180deg, rgba(14, 14, 15, .9), rgba(7, 7, 8, .78));
    color: var(--bone);
    cursor: pointer;
    overflow: hidden;
    transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
  }
  .b-weapon:hover { border-color: rgba(255, 255, 255, .7); transform: translateY(-4px); }
  .b-weapon.is-selected {
    border-color: var(--blood);
    box-shadow: 0 0 0 1px rgba(196, 30, 58, .4), 0 0 36px rgba(196, 30, 58, .3);
    transform: translateY(-4px);
  }
  .b-weapon.is-selected::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 100%, rgba(196, 30, 58, .3), transparent 66%);
  }
  .b-weapon img {
    position: relative;
    width: 100%;
    height: 216px;
    margin-top: 14px;
    object-fit: contain;
    filter: drop-shadow(0 8px 14px rgba(0, 0, 0, .65));
  }
  .b-weapon .w-name {
    position: relative;
    display: block;
    margin-top: 6px;
    font: 27px/1 "New Rocker", serif;
    letter-spacing: 1.6px;
    color: #fff;
  }
  .b-weapon .w-record {
    position: relative;
    display: block;
    margin-top: 8px;
    color: var(--bone-dim);
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 2.4px;
    text-transform: uppercase;
  }
  .b-weapon .w-record b { color: var(--gold); font: 14px/1 "Grenze", serif; }
  .b-weapon .w-ribbon {
    position: absolute;
    top: 12px;
    left: 50%;
    translate: -50% 0;
    padding: 3px 12px;
    border: 1px solid rgba(196, 30, 58, .55);
    background: rgba(38, 5, 11, .85);
    color: #eeb2bd;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.6px;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity .16s ease;
  }
  .b-weapon.is-selected .w-ribbon { opacity: 1; }

  .b-track-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    min-height: 0;
  }
  .b-track-label {
    display: flex;
    align-items: center;
    gap: 16px;
    color: var(--bone-dim);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .b-track-label::before,
  .b-track-label::after {
    content: "";
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(196, 30, 58, .8));
  }
  .b-track-label::after { transform: scaleX(-1); }
  .b-track {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 17px;
    padding: 30px 34px;
    border: 1px solid rgba(255, 255, 255, .12);
    background: rgba(6, 6, 7, .6);
  }
  .b-track::before {
    content: "";
    position: absolute;
    left: 40px;
    right: 40px;
    top: 50%;
    height: 1px;
    background: rgba(255, 255, 255, .24);
  }
  .station {
    position: relative;
    z-index: 2;
    width: 30px;
    height: 30px;
    padding: 0;
    border: 1px solid rgba(255, 255, 255, .42);
    background: #121214;
    rotate: 45deg;
    cursor: pointer;
    transition: background .14s ease, border-color .14s ease, box-shadow .14s ease, scale .14s ease;
  }
  .station:hover { border-color: #fff; scale: 1.2; }
  .station.is-active {
    border-color: var(--blood);
    background: linear-gradient(135deg, #e4576f, var(--blood) 55%, var(--blood-dim));
    box-shadow: 0 0 10px rgba(196, 30, 58, .6);
  }
  .station.is-current {
    box-shadow: 0 0 0 4px rgba(196, 30, 58, .3), 0 0 20px rgba(196, 30, 58, .9);
    scale: 1.24;
  }
  .station.is-locked {
    border-color: rgba(255, 255, 255, .13);
    background: #0a0a0b;
    cursor: not-allowed;
  }
  .station.is-locked:hover { scale: 1; border-color: rgba(255, 255, 255, .22); }
  .station .st-num {
    position: absolute;
    left: 50%;
    top: 50%;
    translate: -50% -50%;
    rotate: -45deg;
    color: rgba(255, 255, 255, .88);
    font: 13px/1 "Grenze", serif;
    pointer-events: none;
  }
  .station.is-locked .st-num { color: rgba(255, 255, 255, .26); }
  .station .st-tick {
    position: absolute;
    left: 50%;
    top: calc(100% + 15px);
    translate: -50% 0;
    rotate: -45deg;
    color: var(--ash);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    pointer-events: none;
  }

  .b-tally-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    min-height: 0;
  }
  .b-level-line {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }
  .b-level-line .lvl-name {
    color: #fff;
    font: 30px/1 "New Rocker", serif;
    letter-spacing: 2px;
  }
  .b-level-line .lvl-count {
    color: var(--bone-dim);
    font-size: 12px;
    letter-spacing: 1.6px;
    text-transform: uppercase;
  }
  .b-tally {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    max-width: 1300px;
  }
  .b-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px 8px 10px;
    border: 1px solid rgba(196, 30, 58, .45);
    border-radius: 999px;
    background: rgba(30, 5, 10, .78);
  }
  .b-chip .glyph {
    display: grid;
    place-items: center;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(196, 30, 58, .5);
    color: #e8b9c1;
  }
  .b-chip .glyph svg { width: 17px; height: 17px; }
  .b-chip .t-name { color: var(--bone); font-size: 13px; font-weight: 700; letter-spacing: .6px; }
  .b-chip .t-count { color: #fff; font: 19px/1 "Grenze", serif; }
  .b-footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  /* =============================================================
     VARIANT C — "The Penitent's Ledger" (centered panel)
     ============================================================= */
  .c-dim {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, .5);
  }
  .c-panel {
    position: absolute;
    left: 50%;
    top: 50%;
    translate: -50% -50%;
    width: 780px;
    height: 1000px;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    border: 1px solid rgba(255, 255, 255, .5);
    background: rgba(8, 8, 9, .95);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .07), 0 40px 110px rgba(0, 0, 0, .9);
  }
  .c-panel::before {
    content: "";
    position: absolute;
    inset: 7px;
    border: 1px solid rgba(196, 30, 58, .22);
    pointer-events: none;
  }
  .c-head {
    position: relative;
    padding: 34px 30px 20px;
    text-align: center;
  }
  .c-head .kicker {
    margin: 0 0 8px;
    color: var(--bone-dim);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
  }
  .c-head h2 {
    margin: 0;
    color: #fff;
    font: 40px/1 "New Rocker", serif;
    letter-spacing: 3px;
  }
  .c-head .masthead-rule { justify-content: center; margin-top: 12px; }
  .c-head .masthead-rule::before,
  .c-head .masthead-rule::after { width: 60px; }
  .c-close {
    position: absolute;
    top: 20px;
    right: 20px;
    display: grid;
    place-items: center;
    width: 38px;
    height: 38px;
    border: 1px solid rgba(255, 255, 255, .38);
    background: rgba(16, 16, 17, .9);
    color: var(--bone);
    font: 16px/1 "New Rocker", serif;
    cursor: pointer;
  }
  .c-close:hover { border-color: var(--blood); color: #fff; }

  .c-weapons {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 6px 40px 0;
  }
  .c-weapon {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    width: 200px;
    padding: 14px 10px 12px;
    border: 1px solid rgba(255, 255, 255, .2);
    background: rgba(16, 16, 18, .85);
    color: var(--bone);
    cursor: pointer;
    transition: border-color .15s ease, background .15s ease, box-shadow .15s ease;
  }
  .c-weapon:hover { border-color: rgba(255, 255, 255, .6); }
  .c-weapon.is-selected {
    border-color: var(--blood);
    background: linear-gradient(180deg, rgba(70, 10, 20, .85), rgba(26, 5, 9, .85));
    box-shadow: 0 0 0 1px rgba(196, 30, 58, .35), 0 0 22px rgba(196, 30, 58, .25);
  }
  .c-weapon img {
    width: 92px;
    height: 96px;
    object-fit: contain;
    filter: drop-shadow(0 5px 9px rgba(0, 0, 0, .6));
  }
  .c-weapon .w-name { font: 19px/1 "New Rocker", serif; letter-spacing: 1px; color: #fff; }
  .c-weapon .w-record {
    color: var(--bone-dim);
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 1.8px;
    text-transform: uppercase;
  }
  .c-weapon .w-record b { color: var(--gold); font: 12px/1 "Grenze", serif; }

  .c-ledger {
    display: flex;
    flex-direction: column;
    min-height: 0;
    padding: 22px 56px 8px;
  }
  .c-stepper {
    display: grid;
    grid-template-columns: 64px 1fr 64px;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
  }
  .c-step-btn {
    display: grid;
    place-items: center;
    width: 64px;
    height: 64px;
    border: 1px solid rgba(255, 255, 255, .35);
    background: rgba(18, 18, 20, .9);
    color: var(--bone);
    font: 30px/1 "Grenze", serif;
    cursor: pointer;
    transition: border-color .15s ease, color .15s ease, background .15s ease;
  }
  .c-step-btn:hover:not(:disabled) { border-color: var(--blood); color: #fff; background: rgba(58, 9, 18, .8); }
  .c-step-btn:disabled { opacity: .28; cursor: not-allowed; }
  .c-step-display { text-align: center; }
  .c-step-display .lvl-kicker {
    color: var(--bone-dim);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .c-step-display .lvl-numeral {
    margin-top: 4px;
    color: #fff;
    font: 84px/1 "New Rocker", serif;
    letter-spacing: 3px;
    text-shadow: 0 0 34px rgba(196, 30, 58, .5), 0 4px 0 rgba(60, 8, 18, .8);
  }
  .c-step-display .lvl-numeral.is-zero { color: var(--bone-dim); text-shadow: none; }
  .c-progress {
    position: relative;
    height: 5px;
    margin: 18px 2px 20px;
    background: rgba(255, 255, 255, .1);
  }
  .c-progress .fill {
    position: absolute;
    inset: 0 auto 0 0;
    background: linear-gradient(90deg, var(--blood-dim), var(--blood));
    box-shadow: 0 0 10px rgba(196, 30, 58, .55);
    transition: width .2s var(--ease-rise);
  }
  .c-progress .best-mark {
    position: absolute;
    top: -4px;
    width: 2px;
    height: 13px;
    background: var(--gold);
    box-shadow: 0 0 8px rgba(232, 196, 93, .7);
  }
  .c-progress-caps {
    display: flex;
    justify-content: space-between;
    margin: -14px 0 16px;
    color: var(--ash);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.6px;
    text-transform: uppercase;
  }
  .c-tally {
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
    min-height: 0;
  }
  .c-next {
    margin-top: 12px;
    color: var(--ash);
    font-size: 11px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    text-align: center;
  }
  .c-next b { color: var(--bone-dim); }

  .c-foot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 18px 0 26px;
    border-top: 1px solid rgba(255, 255, 255, .12);
    background: rgba(0, 0, 0, .3);
  }

  @media (max-width: 850px) {
    .page-header { grid-template-columns: 1fr; }
    .variant-controls { flex-wrap: wrap; }
    .page-main { padding: 18px 12px 36px; }
  }
</style>
</head>
<body>
<header class="page-header">
  <div>
    <h1 class="page-title">Way Station — Begin the Climb</h1>
    <p class="page-description" id="variant-description"></p>
  </div>
  <div class="variant-controls" id="variant-controls">
    <button class="variant-chip" data-variant="a" type="button">A — The Rosary</button>
    <button class="variant-chip" data-variant="b" type="button">B — Stations of the Ascent</button>
    <button class="variant-chip" data-variant="c" type="button">C — The Penitent's Ledger</button>
  </div>
</header>

<main class="page-main">
  <div class="viewport-scaler">
    <div class="viewport" id="viewport">
      <div class="bg-scene"></div>
      <div class="scene-dim"></div>
      <div class="grain"></div>

      <!-- Variant A: The Rosary -->
      <section class="variant-root" id="root-a" aria-label="Variant A — The Rosary">
        <button class="close-x" type="button" aria-label="Close">X</button>
        <div class="a-layout">
          <header class="masthead">
            <p class="kicker">The Way Station</p>
            <h2>Begin the Climb</h2>
            <div class="masthead-rule" aria-hidden="true"><span></span></div>
          </header>
          <div class="a-body">
            <div>
              <p class="a-weapons-label">Starting Weapon</p>
              <div class="a-weapons" id="a-weapons"></div>
            </div>
            <div class="a-chain-col">
              <p class="a-chain-cap">Penance XXIV</p>
              <div class="a-chain" id="a-chain"></div>
              <div class="a-cross" aria-hidden="true"></div>
            </div>
            <div class="a-summary">
              <p class="a-summary-label">Penances Borne</p>
              <div class="a-summary-panel">
                <div class="a-level-line" id="a-level"></div>
                <div class="a-tally" id="a-tally"></div>
                <p class="a-next" id="a-next"></p>
              </div>
            </div>
          </div>
          <footer class="a-footer">
            <button class="depart-btn" type="button">Depart</button>
            <p class="footer-sub" id="a-footer-sub"></p>
          </footer>
        </div>
      </section>

      <!-- Variant B: Stations of the Ascent -->
      <section class="variant-root" id="root-b" aria-label="Variant B — Stations of the Ascent">
        <button class="close-x" type="button" aria-label="Close">X</button>
        <div class="b-layout">
          <header class="masthead">
            <p class="kicker">The Way Station</p>
            <h2>Begin the Climb</h2>
            <div class="masthead-rule" aria-hidden="true"><span></span></div>
          </header>
          <div class="b-weapons" id="b-weapons"></div>
          <div class="b-track-zone">
            <div class="b-track-label">The Stations of Penance</div>
            <div class="b-track" id="b-track"></div>
            <div class="b-tally-zone">
              <div class="b-level-line" id="b-level"></div>
              <div class="b-tally" id="b-tally"></div>
            </div>
          </div>
          <footer class="b-footer">
            <button class="depart-btn" type="button">Depart</button>
            <p class="footer-sub" id="b-footer-sub"></p>
          </footer>
        </div>
      </section>

      <!-- Variant C: The Penitent's Ledger -->
      <section class="variant-root" id="root-c" aria-label="Variant C — The Penitent's Ledger">
        <div class="c-dim"></div>
        <div class="c-panel">
          <header class="c-head">
            <p class="kicker">The Way Station</p>
            <h2>Begin the Climb</h2>
            <div class="masthead-rule" aria-hidden="true"><span></span></div>
            <button class="c-close" type="button" aria-label="Close">X</button>
          </header>
          <div class="c-weapons" id="c-weapons"></div>
          <div class="c-ledger">
            <div class="c-stepper">
              <button class="c-step-btn" id="c-minus" type="button" aria-label="Lower penance">−</button>
              <div class="c-step-display">
                <p class="lvl-kicker">Penance</p>
                <div class="lvl-numeral" id="c-numeral">0</div>
              </div>
              <button class="c-step-btn" id="c-plus" type="button" aria-label="Raise penance">+</button>
            </div>
            <div class="c-progress" id="c-progress">
              <div class="fill" id="c-fill"></div>
              <div class="best-mark" id="c-best"></div>
            </div>
            <div class="c-progress-caps"><span>Absolved</span><span>Penance XXIV</span></div>
            <div class="c-tally" id="c-tally"></div>
            <p class="c-next" id="c-next"></p>
          </div>
          <footer class="c-foot">
            <button class="depart-btn" type="button">Depart</button>
            <p class="footer-sub" id="c-footer-sub"></p>
          </footer>
        </div>
      </section>

      <div class="tooltip" id="tooltip" role="tooltip"></div>
    </div>
  </div>
</main>

<script>
  const GAME_W = 1920;
  const GAME_H = 1080;

  /* ---------------- data ---------------- */
  const PENANCE_TYPES = {
    fasting: {
      name: "Fasting",
      desc: "The Crusader begins the climb with 1 less max HP.",
      glyph: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20s-7-4.6-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 10c0 5.4-7 10-7 10Z"/><path d="M8.5 11h7"/></svg>`
    },
    mortification: {
      name: "Mortification",
      desc: "Enemies have 5% more HP.",
      glyph: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a7 7 0 0 0-7 7c0 3 1.6 4.6 3 5.6V19h8v-3.4c1.4-1 3-2.6 3-5.6a7 7 0 0 0-7-7Z"/><circle cx="9" cy="10.5" r="1" fill="currentColor" stroke="none"/><circle cx="15" cy="10.5" r="1" fill="currentColor" stroke="none"/><path d="M10.5 19v-2M13.5 19v-2"/></svg>`
    },
    abstinence: {
      name: "Abstinence",
      desc: "Begin each battle with 1 fewer starting resource.",
      glyph: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 4h12c0 5-2.6 7.5-6 7.5S6 9 6 4Z"/><path d="M12 11.5V19M8.5 19h7"/><path d="M4.5 2.5l15 17"/></svg>`
    },
    pilgrimage: {
      name: "Penitential Pilgrimage",
      desc: "The shop takes 1 additional climb to reset its wares.",
      glyph: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3c-2 1.4-2.6 3.4-1.6 5"/><path d="M14 8 8 21"/><circle cx="15.5" cy="4.5" r="1.9"/><path d="M17.5 21c.4-1.6-.2-2.6-1.4-2.9"/></svg>`
    },
    reparation: {
      name: "Reparation",
      desc: "1 starter card is replaced with a random card bearing a random negative modification.",
      glyph: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="6" y="3.5" width="12" height="17" rx="1.6"/><path d="M13.4 3.5 10.6 10l3.2 1.4-3 6.2"/></svg>`
    }
  };

  /* Fixed unlock order, identical for every weapon. */
  const PENANCE_ORDER = [
    "fasting", "reparation", "abstinence", "mortification",
    "fasting", "reparation", "abstinence", "mortification",
    "reparation", "pilgrimage", "fasting", "mortification",
    "reparation", "fasting", "reparation", "mortification",
    "abstinence", "reparation", "pilgrimage", "mortification",
    "reparation", "fasting", "reparation", "mortification"
  ];
  const MAX_PENANCE = PENANCE_ORDER.length; /* 24 */
  const TALLY_DISPLAY_ORDER = ["fasting", "mortification", "abstinence", "pilgrimage", "reparation"];

  const WEAPONS = [
    { id: "sword", name: "Sword", art: "../Content/CardArt/sword.png", highest: 5 },
    { id: "dagger", name: "Dagger", art: "../Content/CardArt/dagger.png", highest: 10 },
    { id: "hammer", name: "Hammer", art: "../Content/CardArt/hammer.png", highest: 12 }
  ];

  const VARIANT_DESCRIPTIONS = {
    a: "Fullscreen overlay. Penances hang as a rosary chain climbing bottom-to-top from a crucifix; decade beads mark every fifth penance. Weapons stack on the left, the tally of burdens on the right. Hover any bead or tally row for its tooltip.",
    b: "Fullscreen overlay. Weapon cards preside over a horizontal track of 24 diamond stations. Lit stations are the burdens you will carry; hollow ones await, crossed ones are locked. The chip row totals the active penances.",
    c: "Refined centered panel closest to the current modal. Compact weapon segments, a large roman-numeral stepper with a progress rail (gold tick = weapon's best), and a grouped ledger of active penances."
  };

  /* ---------------- state ---------------- */
  const state = {
    variant: "a",
    weapon: "dagger",
    /* Each weapon remembers its own chosen level; defaults to its highest unlocked. */
    chosen: Object.fromEntries(WEAPONS.map(w => [w.id, w.highest]))
  };

  const weaponById = id => WEAPONS.find(w => w.id === id);
  const currentWeapon = () => weaponById(state.weapon);
  const currentLevel = () => state.chosen[state.weapon];

  /* ---------------- helpers ---------------- */
  function toRoman(n) {
    if (n <= 0) return "0";
    const table = [[10, "X"], [9, "IX"], [5, "V"], [4, "IV"], [1, "I"]];
    let out = "";
    for (const [value, sym] of table) {
      while (n >= value) { out += sym; n -= value; }
    }
    return out;
  }

  function tallyCounts(level) {
    const counts = {};
    for (let i = 0; i < level; i++) {
      const key = PENANCE_ORDER[i];
      counts[key] = (counts[key] || 0) + 1;
    }
    return counts;
  }

  function levelTitle(level) {
    return level === 0 ? "Unburdened" : `Penance ${toRoman(level)}`;
  }

  function nodeTip(level) {
    const weapon = currentWeapon();
    const type = PENANCE_TYPES[PENANCE_ORDER[level - 1]];
    if (level > weapon.highest) {
      return `<b>Penance ${toRoman(level)} — Locked</b><span class="tip-muted">Conquer Penance ${toRoman(level - 1)} with the ${weapon.name} to unlock.</span>`;
    }
    return `<b>Penance ${toRoman(level)} — ${type.name}</b>${type.desc}`;
  }

  function typeTip(key, count) {
    const type = PENANCE_TYPES[key];
    return `<b>${type.name} ×${count}</b>${type.desc}${count > 1 ? ` <span class="tip-muted">(applied ${count} times)</span>` : ""}`;
  }

  function setLevel(level) {
    const max = currentWeapon().highest;
    state.chosen[state.weapon] = Math.max(0, Math.min(level, max));
    render();
  }

  function onNodeClick(level) {
    if (level > currentWeapon().highest) return;
    setLevel(level === currentLevel() ? level - 1 : level);
  }

  function selectWeapon(id) {
    state.weapon = id;
    const weapon = currentWeapon();
    state.chosen[id] = Math.min(state.chosen[id], weapon.highest);
    render();
  }

  /* ---------------- shared renderers ---------------- */
  function weaponTipHtml(weapon) {
    return `<b>${weapon.name}</b>Highest penance conquered: ${weapon.highest === 0 ? "none" : toRoman(weapon.highest)} of ${toRoman(MAX_PENANCE)}.`;
  }

  function tallyRowsHtml(level, rowClass) {
    const counts = tallyCounts(level);
    const rows = TALLY_DISPLAY_ORDER.filter(key => counts[key]).map(key => `
      <div class="${rowClass}" data-tip='${typeTip(key, counts[key]).replace(/'/g, "&#39;")}'>
        <span class="glyph">${PENANCE_TYPES[key].glyph}</span>
        <span class="t-name">${PENANCE_TYPES[key].name}</span>
        <span class="t-count">×${counts[key]}</span>
      </div>`).join("");
    return rows || `<div class="tally-empty">No penance borne — an unburdened climb.</div>`;
  }

  function nextLineHtml(level) {
    const weapon = currentWeapon();
    if (level >= MAX_PENANCE) return "Every penance has been named.";
    const next = PENANCE_TYPES[PENANCE_ORDER[level]];
    if (level >= weapon.highest) {
      return `Conquer this climb to unlock <b>Penance ${toRoman(level + 1)} — ${next.name}</b>`;
    }
    return `Next burden: <b>Penance ${toRoman(level + 1)} — ${next.name}</b>`;
  }

  function footerSubHtml(level) {
    const weapon = currentWeapon();
    return level === 0
      ? `Depart with the <b>${weapon.name}</b>, unburdened`
      : `Depart with the <b>${weapon.name}</b> under <b>Penance ${toRoman(level)}</b>`;
  }

  /* ---------------- variant A ---------------- */
  function renderVariantA() {
    const level = currentLevel();
    const weapon = currentWeapon();

    document.getElementById("a-weapons").innerHTML = WEAPONS.map(w => `
      <button class="a-weapon${w.id === state.weapon ? " is-selected" : ""}" type="button"
        data-weapon="${w.id}" data-tip='${weaponTipHtml(w).replace(/'/g, "&#39;")}'>
        <img src="${w.art}" alt="">
        <span>
          <span class="w-name">${w.name}</span>
          <span class="w-record">Highest Penance <b>${w.highest === 0 ? "—" : toRoman(w.highest)}</b></span>
        </span>
        <span class="w-pick">✝</span>
      </button>`).join("");

    document.getElementById("a-chain").innerHTML = Array.from({ length: MAX_PENANCE }, (_, i) => {
      const lvl = i + 1;
      const classes = ["bead"];
      if (lvl % 5 === 0) classes.push("is-decade");
      if (lvl <= level) classes.push("is-active");
      if (lvl === level) classes.push("is-current");
      if (lvl > weapon.highest) classes.push("is-locked");
      return `<button class="${classes.join(" ")}" type="button" data-level="${lvl}"
        data-tip='${nodeTip(lvl).replace(/'/g, "&#39;")}' aria-label="Penance ${lvl}"></button>`;
    }).join("");

    document.getElementById("a-level").innerHTML = `
      <span class="lvl-name">${levelTitle(level)}</span>
      <span class="lvl-count">${level} of ${MAX_PENANCE}</span>`;
    document.getElementById("a-tally").innerHTML = tallyRowsHtml(level, "tally-row");
    document.getElementById("a-next").innerHTML = nextLineHtml(level);
    document.getElementById("a-footer-sub").innerHTML = footerSubHtml(level);
  }

  /* ---------------- variant B ---------------- */
  function renderVariantB() {
    const level = currentLevel();
    const weapon = currentWeapon();

    document.getElementById("b-weapons").innerHTML = WEAPONS.map(w => `
      <button class="b-weapon${w.id === state.weapon ? " is-selected" : ""}" type="button"
        data-weapon="${w.id}" data-tip='${weaponTipHtml(w).replace(/'/g, "&#39;")}'>
        <span class="w-ribbon">Chosen</span>
        <img src="${w.art}" alt="">
        <span class="w-name">${w.name}</span>
        <span class="w-record">Best Penance <b>${w.highest === 0 ? "—" : toRoman(w.highest)}</b></span>
      </button>`).join("");

    document.getElementById("b-track").innerHTML = Array.from({ length: MAX_PENANCE }, (_, i) => {
      const lvl = i + 1;
      const classes = ["station"];
      if (lvl <= level) classes.push("is-active");
      if (lvl === level) classes.push("is-current");
      if (lvl > weapon.highest) classes.push("is-locked");
      const tick = lvl % 6 === 0 ? `<span class="st-tick">${toRoman(lvl)}</span>` : "";
      return `<button class="${classes.join(" ")}" type="button" data-level="${lvl}"
        data-tip='${nodeTip(lvl).replace(/'/g, "&#39;")}' aria-label="Penance ${lvl}">
        <span class="st-num">${lvl}</span>${tick}
      </button>`;
    }).join("");

    document.getElementById("b-level").innerHTML = `
      <span class="lvl-name">${levelTitle(level)}</span>
      <span class="lvl-count">${level} of ${MAX_PENANCE} burdens borne</span>`;
    document.getElementById("b-tally").innerHTML = tallyRowsHtml(level, "b-chip");
    document.getElementById("b-footer-sub").innerHTML = footerSubHtml(level);
  }

  /* ---------------- variant C ---------------- */
  function renderVariantC() {
    const level = currentLevel();
    const weapon = currentWeapon();

    document.getElementById("c-weapons").innerHTML = WEAPONS.map(w => `
      <button class="c-weapon${w.id === state.weapon ? " is-selected" : ""}" type="button"
        data-weapon="${w.id}" data-tip='${weaponTipHtml(w).replace(/'/g, "&#39;")}'>
        <img src="${w.art}" alt="">
        <span class="w-name">${w.name}</span>
        <span class="w-record">Best <b>${w.highest === 0 ? "—" : toRoman(w.highest)}</b></span>
      </button>`).join("");

    const numeral = document.getElementById("c-numeral");
    numeral.textContent = toRoman(level);
    numeral.classList.toggle("is-zero", level === 0);

    document.getElementById("c-minus").disabled = level <= 0;
    document.getElementById("c-plus").disabled = level >= weapon.highest;
    document.getElementById("c-fill").style.width = `${(level / MAX_PENANCE) * 100}%`;
    document.getElementById("c-best").style.left = `calc(${(weapon.highest / MAX_PENANCE) * 100}% - 1px)`;

    document.getElementById("c-tally").innerHTML = tallyRowsHtml(level, "tally-row");
    document.getElementById("c-next").innerHTML = nextLineHtml(level);
    document.getElementById("c-footer-sub").innerHTML = footerSubHtml(level);
  }

  /* ---------------- top-level render / events ---------------- */
  function render() {
    renderVariantA();
    renderVariantB();
    renderVariantC();
    hideTooltip();
  }

  function setVariant(id) {
    state.variant = id;
    document.querySelectorAll(".variant-root").forEach(root => {
      root.classList.toggle("is-active", root.id === `root-${id}`);
    });
    document.querySelectorAll(".variant-chip").forEach(chip => {
      chip.classList.toggle("is-active", chip.dataset.variant === id);
    });
    document.getElementById("variant-description").textContent = VARIANT_DESCRIPTIONS[id];
    hideTooltip();
  }

  document.getElementById("variant-controls").addEventListener("click", event => {
    const chip = event.target.closest(".variant-chip");
    if (chip) setVariant(chip.dataset.variant);
  });

  const viewport = document.getElementById("viewport");
  viewport.addEventListener("click", event => {
    const weaponBtn = event.target.closest("[data-weapon]");
    if (weaponBtn) { selectWeapon(weaponBtn.dataset.weapon); return; }
    const node = event.target.closest("[data-level]");
    if (node) onNodeClick(Number(node.dataset.level));
  });

  document.getElementById("c-minus").addEventListener("click", () => setLevel(currentLevel() - 1));
  document.getElementById("c-plus").addEventListener("click", () => setLevel(currentLevel() + 1));

  window.addEventListener("keydown", event => {
    if (event.key === "ArrowUp" || event.key === "ArrowRight") setLevel(currentLevel() + 1);
    if (event.key === "ArrowDown" || event.key === "ArrowLeft") setLevel(currentLevel() - 1);
    if (event.key === "1") selectWeapon("sword");
    if (event.key === "2") selectWeapon("dagger");
    if (event.key === "3") selectWeapon("hammer");
  });

  /* ---------------- tooltip ---------------- */
  const tooltip = document.getElementById("tooltip");
  let viewScale = 1;

  function hideTooltip() { tooltip.classList.remove("is-visible"); }

  function showTooltip(target) {
    const html = target.dataset.tip;
    if (!html) return;
    tooltip.innerHTML = html;
    tooltip.classList.add("is-visible");

    const vpRect = viewport.getBoundingClientRect();
    const rect = target.getBoundingClientRect();
    const x = (rect.left + rect.width / 2 - vpRect.left) / viewScale;
    const yTop = (rect.top - vpRect.top) / viewScale;
    const yBottom = (rect.bottom - vpRect.top) / viewScale;

    const tw = tooltip.offsetWidth;
    const th = tooltip.offsetHeight;
    let left = Math.max(12, Math.min(x - tw / 2, GAME_W - tw - 12));
    let top = yTop - th - 14;
    if (top < 12) top = yBottom + 14;
    tooltip.style.left = `${left}px`;
    tooltip.style.top = `${top}px`;
  }

  viewport.addEventListener("mouseover", event => {
    const target = event.target.closest("[data-tip]");
    if (target) showTooltip(target);
    else hideTooltip();
  });
  viewport.addEventListener("mouseleave", hideTooltip);

  /* ---------------- viewport scaling ---------------- */
  function fitViewport() {
    const scaler = document.querySelector(".viewport-scaler");
    viewScale = scaler.clientWidth / GAME_W;
    viewport.style.transform = `translateX(-50%) scale(${viewScale})`;
    scaler.style.height = `${GAME_H * viewScale}px`;
  }
  window.addEventListener("resize", fitViewport);
  window.addEventListener("load", fitViewport);

  render();
  setVariant("a");
  fitViewport();
</script>
</body>
</html>
