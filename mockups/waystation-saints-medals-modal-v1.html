<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChurchSuffering — Waystation Saints Medal Chronicle</title>
<link href="https://fonts.googleapis.com/css2?family=New+Rocker&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /*
    MonoGame notes (1920x1080 virtual; page chrome not shipped):
    - Scene bg: waystation.png; modal dim rgba(0,0,0,0.68)
    - Modal shell: inset 48px; fill rgba(8,8,8,0.94); border 2px white 85%
    - Split layout: left medal grid (4 cols), right saint detail on click
    - Acquired medals: MedalDisplaySystem icon or black circle placeholder
    - Unacquired: grey circle with "?" ; not selectable
    - Detail: medal Text + keyword blocks, Years on Earth, bio, patronages, prayer
  */
  :root {
    --black-0: #050505;
    --black-1: #0a0a0a;
    --black-2: #141414;
    --black-3: #1e1e1e;
    --black-4: #2a2a2a;
    --white-1: #ffffff;
    --white-2: #f0ece6;
    --white-3: #c8c0b8;
    --red-dark: #8b0000;
    --red-brick: #b43232;
    --red-3: #c41e3a;
    --red-glow: rgba(196, 30, 58, 0.45);
    --gold: #ffd700;
    --gold-dim: #a08030;
    --kw-color: #d4a84a;
    --panel-border: rgba(255, 255, 255, 0.85);
    --panel-fill: rgba(8, 8, 8, 0.94);
    --game-w: 1920px;
    --game-h: 1080px;
    --modal-margin: 48px;
    --modal-pad: 32px;
    --icon-size: 88px;
    --icon-gap: 14px;
    --close-size: 40px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black-0);
    color: var(--white-2);
    font-family: 'Chakra Petch', sans-serif;
    min-height: 100vh;
    overflow-x: auto;
    overflow-y: auto;
  }

  .page-header {
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--black-4);
    background: var(--black-1);
  }

  .page-header h1 {
    font-family: 'New Rocker', cursive;
    font-size: 1.8rem;
    letter-spacing: 2px;
    color: var(--white-1);
    margin-bottom: 4px;
  }

  .page-header p {
    color: var(--white-3);
    font-size: 0.85rem;
    letter-spacing: 1px;
    max-width: 960px;
    line-height: 1.5;
  }

  .page-main { padding: 32px 40px 60px; }

  .viewport-scaler {
    width: 100%;
    max-width: min(calc(100vw - 80px), 1320px);
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    background: var(--black-2);
    border: 1px solid var(--black-4);
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.7);
    min-height: 320px;
  }

  .viewport {
    width: var(--game-w);
    height: var(--game-h);
    position: absolute;
    top: 0;
    left: 50%;
    transform-origin: top center;
    overflow: hidden;
  }

  .bg-scene {
    position: absolute;
    inset: 0;
    background: url('../Content/waystation.png') center / cover no-repeat;
  }

  .bg-dim {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.68);
  }

  .saints-modal {
    position: absolute;
    inset: var(--modal-margin);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 10;
    background: var(--panel-fill);
    border: 2px solid var(--panel-border);
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.08) inset,
      0 32px 80px rgba(0, 0, 0, 0.75);
  }

  .modal-header {
    flex-shrink: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(var(--close-size) + var(--modal-pad) * 2);
    padding: var(--modal-pad);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }

  .header-title-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .modal-title {
    font-family: 'New Rocker', cursive;
    font-size: 44px;
    color: var(--white-1);
    letter-spacing: 2px;
    line-height: 1;
    text-align: center;
  }

  .btn-close {
    position: absolute;
    top: var(--modal-pad);
    right: var(--modal-pad);
    width: var(--close-size);
    height: var(--close-size);
    border: 2px solid rgba(255, 255, 255, 0.5);
    background: rgba(0, 0, 0, 0.5);
    color: var(--white-1);
    font-family: 'Chakra Petch', sans-serif;
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn-close:hover {
    border-color: var(--red-3);
    background: var(--red-dark);
    box-shadow: 0 0 16px var(--red-glow);
  }

  .modal-body {
    flex: 1;
    min-height: 0;
    display: flex;
    overflow: hidden;
  }

  .split-list {
    width: 42%;
    border-right: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .list-toolbar {
    padding: 18px 24px 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }

  .list-toolbar h3 {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--white-3);
    font-weight: 600;
  }

  .medal-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px 28px;
  }

  .medal-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--icon-gap);
  }

  .split-detail {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    padding: 28px 36px 32px;
    overflow-y: auto;
  }

  .detail-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 14px;
    color: var(--white-3);
    padding: 40px;
  }

  .detail-empty-icon {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 2px dashed rgba(255, 255, 255, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: rgba(255, 255, 255, 0.25);
  }

  .detail-empty p {
    font-size: 16px;
    line-height: 1.5;
    max-width: 340px;
  }

  .saint-detail { display: none; }
  .saint-detail.is-visible { display: block; }

  .saint-name {
    font-family: 'New Rocker', cursive;
    font-size: 36px;
    color: var(--white-1);
    margin-bottom: 18px;
    line-height: 1.1;
  }

  .medal-effect-block {
    margin-bottom: 20px;
    padding: 16px 18px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 6px;
  }

  .medal-effect-text {
    font-size: 17px;
    line-height: 1.55;
    color: var(--white-2);
  }

  .medal-effect-text .kw {
    color: var(--kw-color);
    font-weight: 600;
  }

  .keyword-blocks {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .keyword-block {
    font-size: 14px;
    line-height: 1.45;
    color: #989088;
    padding-left: 12px;
    border-left: 2px solid rgba(212, 168, 74, 0.35);
  }

  .saint-section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--white-3);
    margin: 20px 0 8px;
  }

  .saint-years {
    font-size: 16px;
    line-height: 1.5;
    color: #c8c0b8;
    font-style: italic;
  }

  .saint-bio {
    font-size: 17px;
    line-height: 1.62;
    color: #b4b0a8;
    margin-bottom: 16px;
  }

  .saint-patronages {
    font-size: 16px;
    line-height: 1.5;
    color: #c8c0b8;
  }

  .saint-prayer {
    margin-top: 4px;
    padding: 18px 20px;
    border-left: 3px solid var(--red-brick);
    background: rgba(255, 255, 255, 0.04);
    font-size: 16px;
    line-height: 1.55;
    font-style: italic;
    color: var(--white-2);
  }

  .medal-tile {
    border: none;
    background: transparent;
    padding: 0;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-align: center;
    transition: transform 0.15s ease;
  }

  .medal-tile:hover:not(.is-locked) { transform: translateY(-3px); }

  .medal-tile.is-selected .medal-icon-wrap {
    box-shadow: 0 0 0 2px var(--red-3), 0 0 20px var(--red-glow);
  }

  .medal-tile.is-locked {
    cursor: default;
    opacity: 0.55;
  }

  .medal-icon-wrap {
    width: var(--icon-size);
    height: var(--icon-size);
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .medal-tile.is-locked .medal-icon-wrap {
    background: #1a1a1a;
    border: 2px dashed rgba(255, 255, 255, 0.12);
  }

  .medal-icon-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .medal-placeholder-label {
    font-family: 'New Rocker', cursive;
    font-size: 9px;
    line-height: 1.15;
    color: var(--white-1);
    padding: 6px;
    text-align: center;
    word-break: break-word;
  }

  .medal-locked-mark {
    font-family: 'New Rocker', cursive;
    font-size: 36px;
    line-height: 1;
    color: rgba(255, 255, 255, 0.28);
  }

  .medal-tile-label {
    font-size: 11px;
    line-height: 1.25;
    color: var(--white-3);
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .medal-tile.is-selected .medal-tile-label { color: var(--white-1); }
  .medal-tile.is-locked .medal-tile-label { visibility: hidden; height: 0; }

  .modal-footer {
    flex-shrink: 0;
    padding: 16px var(--modal-pad);
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .collection-label {
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--white-3);
  }

  .collection-meter {
    flex: 1;
    max-width: 520px;
    height: 12px;
    border-radius: 6px;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.08);
  }

  .collection-fill {
    height: 100%;
    border-radius: 6px;
    background: linear-gradient(90deg, var(--red-dark), var(--red-brick));
    transition: width 0.35s ease;
  }

  .collection-count {
    font-family: 'New Rocker', cursive;
    font-size: 20px;
    color: var(--white-1);
    white-space: nowrap;
  }
</style>
</head>
<body>

<header class="page-header">
  <h1>Waystation — Saints Medal Chronicle</h1>
  <p>
    Split-ledger modal over the Waystation scene. Every medal slot is shown; unacquired medals appear as
    question-mark circles.
  </p>
</header>

<main class="page-main">
  <div class="viewport-scaler">
    <div class="viewport">
      <div class="bg-scene"></div>
      <div class="bg-dim"></div>

      <div class="saints-modal">
        <header class="modal-header">
          <div class="header-title-block">
            <h2 class="modal-title">Communion of Saints</h2>
          </div>
          <button type="button" class="btn-close" aria-label="Close">X</button>
        </header>
        <div class="modal-body">
          <aside class="split-list">
            <div class="list-toolbar">
              <h3>Medals Acquired</h3>
            </div>
            <div class="medal-scroll">
              <div class="medal-grid" id="medal-grid"></div>
            </div>
          </aside>
          <div class="split-detail">
            <div class="detail-empty" id="detail-empty">
              <div class="detail-empty-icon">+</div>
              <p>Select a medal to read the life of the saint whose intercession you carry.</p>
            </div>
            <div class="saint-detail" id="saint-detail"></div>
          </div>
        </div>
        <footer class="modal-footer">
          <span class="collection-label">Collection</span>
          <div class="collection-meter"><div class="collection-fill" id="collection-fill"></div></div>
          <span class="collection-count" id="collection-count">12 / 23</span>
        </footer>
      </div>
    </div>
  </div>
</main>

<script>
  const GAME_W = 1920;
  const GAME_H = 1080;
  const TOTAL_MEDALS = 23;

  const MEDAL_TEXTURES = {
    st_michael: '../Content/st_michael.png',
    st_peter: '../Content/st_peter.png',
    st_luke: '../Content/st_luke.png',
    st_nicholas: '../Content/st_nicholas.png',
    st_louie_ix: '../Content/st_louie_ix.png'
  };

  /* Mirrors TooltipTextService.KeywordDefinitions */
  const KEYWORD_DEFS = [
    { id: 'aegis', aliases: ['aegis'], tooltip: 'X Aegis - Prevent the next X damage from any source.' },
    { id: 'aggression', aliases: ['aggression'], tooltip: 'X Aggression - Your next non-weapon attack this turn gains +X damage.' },
    { id: 'burn', aliases: ['burn', 'burns'], tooltip: 'X Burn - At the start of the turn, take X damage.' },
    { id: 'brittle', aliases: ['brittle'], tooltip: 'Brittle - If you block an attack with only this card, mill 1.' },
    { id: 'frostbite', aliases: ['frostbite'], tooltip: 'X Frostbite - When you have 3 stacks of frostbite, take 3 damage and lose 3 frostbite.' },
    { id: 'frozen', aliases: ['frozen'], tooltip: 'Frozen - When you play a frozen card, gain 1 frostbite.' },
    { id: 'might', aliases: ['might'], tooltip: 'X Might - Your attacks deal +X damage this turn.' },
    { id: 'mill', aliases: ['mill'], tooltip: 'Mill X - Discard the top X cards of your deck.' },
    { id: 'resurrect', aliases: ['resurrect'], tooltip: 'Resurrect X - draw X random cards from your discard pile.' },
    { id: 'scorched', aliases: ['scorched'], tooltip: 'Scorched - When pledged, lose 1 HP.' },
    { id: 'thorned', aliases: ['thorned'], tooltip: 'Thorned - When discarded to pay a card cost, gain 1 scar.' },
    { id: 'vigor', aliases: ['vigor'], tooltip: 'X Vigor - The next non-weapon card with a cost you play costs X discard less.' }
  ];

  const ALL_MEDALS = [
    {
      id: 'st_augustine', name: 'St. Augustine of Hippo', shortName: 'Augustine', acquired: true,
      medalText: 'At the start of battle, mill 1 card. Increase your max HP by 1 when this is acquired.',
      yearsOnEarth: '354-430',
      patronages: 'Converts to Christianity; theologians; printers; brewers.',
      prayer: 'You have made us for Yourself, O Lord, and our heart is restless until it rests in You.',
      bio: [
        'Augustine was born in Roman North Africa in 354. Brilliant and restless, he pursued rhetoric, worldly ambition, and several competing philosophies before the prayers of his mother, St. Monica, and the preaching of St. Ambrose helped lead him to baptism in 387.',
        'He later became Bishop of Hippo and one of the Church\'s most influential theologians. His Confessions, The City of God, and writings on grace, memory, desire, and the human will continue to shape Western Christianity, earning him recognition as a Doctor of the Church.'
      ]
    },
    {
      id: 'st_benedict', name: 'St. Benedict', shortName: 'Benedict', acquired: true,
      medalText: 'Whenever you pledge 3 cards, gain 1 vigor.',
      yearsOnEarth: 'c. 480-c. 547',
      patronages: 'Europe; monks; religious communities; students; protection against poison and temptation.',
      prayer: 'May the Holy Cross be my light; let not the dragon be my guide.',
      bio: [
        'Benedict was born in Nursia around 480 and withdrew from the corruption of Roman society to live as a hermit. Disciples soon gathered around him, and he eventually founded the monastery of Monte Cassino, which became a center of prayer, learning, and disciplined community life.',
        'His Rule of St. Benedict joined prayer, work, study, obedience, hospitality, and moderation into a durable pattern of Christian life. Its influence across Europe was so great that Benedict is often called the father of Western monasticism and was named a patron of Europe.'
      ]
    },
    {
      id: 'st_christopher', name: 'St. Christopher', shortName: 'Christopher', acquired: false,
      medalText: 'Your brittle cards have +1 block.',
      yearsOnEarth: '3rd century AD (traditional; exact dates unknown)',
      patronages: 'Travelers; motorists; sailors; transportation workers; protection during journeys.',
      prayer: 'St. Christopher, accompany all who travel. Ask God to grant us alert minds, steady hands, safe passage, and a faithful arrival at our true home. Amen.',
      bio: [
        'Very little can be established with certainty about Christopher beyond an ancient tradition that he was a martyr. The familiar medieval legend portrays him as a powerful ferryman who carried a child across a dangerous river, only to discover that the child was Christ bearing the weight of the world.',
        'Christopher\'s name means "Christ-bearer," and his legend made him an enduring image of service, strength, and safe passage. His memorial was removed from the universal Roman calendar because of limited historical evidence, but he was not "unsainted" and remains widely venerated.'
      ]
    },
    {
      id: 'st_clare', name: 'St. Clare of Assisi', shortName: 'Clare', acquired: false,
      medalText: 'At the start of battle, deal 2 damage to the enemy.',
      yearsOnEarth: '1194-1253',
      patronages: 'Television; telecommunications; eye disorders; embroiderers; the Poor Clares.',
      prayer: 'May the Lord bless and guard you, look upon you with mercy, and grant you peace.',
      bio: [
        'Clare was born into a noble family in Assisi in 1194. Inspired by the preaching of St. Francis, she left wealth and social expectation behind, received a simple habit from Francis, and became the leader of the community later known as the Poor Clares.',
        'She defended her community\'s radical commitment to poverty and became the first woman known to write a religious rule approved by the pope. Tradition also remembers her confidence in the Eucharist when her convent was threatened, and her reported vision of a distant Mass led to her patronage of television.'
      ]
    },
    {
      id: 'st_elijah', name: 'St. Elijah', shortName: 'Elijah', acquired: true,
      medalText: 'The first time each battle you pledge a scorched card, the enemy gains 1 burn.',
      yearsOnEarth: 'fl. 9th century BC; earthly death not recorded in Scripture',
      patronages: 'The Carmelite Order; contemplatives; those seeking courage in defending the faith; prayers for rain in times of drought.',
      prayer: 'Lord, God of Abraham, Isaac, and Israel, answer me so that Your people may know that You are God and that You turn hearts back to Yourself.',
      bio: [
        'Elijah was a prophet in the northern kingdom of Israel during the ninth century before Christ. He confronted King Ahab and Queen Jezebel, challenged the prophets of Baal on Mount Carmel, defended the worship of the true God, and experienced God\'s quiet presence at Horeb after fleeing in exhaustion.',
        'Scripture says Elijah was taken up in a whirlwind with a chariot of fire. Catholic tradition venerates him as a saint, while the Carmelite Order honors him as its spiritual father because of his zeal, solitude, prayer, and association with Mount Carmel.'
      ]
    },
    {
      id: 'st_francis_de_sales', name: 'St. Francis de Sales', shortName: 'Francis', acquired: false,
      medalText: 'At the start of battle, gain 1 temperance.',
      yearsOnEarth: '1567-1622',
      patronages: 'Writers; journalists; the Catholic press; deaf people; educators and authors.',
      prayer: 'St. Francis de Sales, teach me to speak truth with gentleness, to remain patient with others, and to seek holiness in the ordinary duties of life. Amen.',
      bio: [
        'Francis de Sales was born in Savoy in 1567 and became a priest during a period of intense religious conflict. When preaching met resistance, he distributed clear, patient explanations of Catholic belief in printed leaflets, combining intellectual firmness with unusual gentleness.',
        'As Bishop of Geneva, governing from Annecy, he taught that holiness was possible in every state of life. His Introduction to the Devout Life and Treatise on the Love of God made practical spirituality accessible to laypeople, and he co-founded the Visitation Order with St. Jane Frances de Chantal.'
      ]
    },
    {
      id: 'st_george', name: 'St. George', shortName: 'George', acquired: false,
      medalText: 'Your block cards can be played as 3 damage free action attacks.',
      yearsOnEarth: '3rd-4th century AD; traditionally died c. 303',
      patronages: 'Soldiers; cavalry; armorers; scouts; England; Georgia.',
      prayer: 'St. George, obtain for us courage in the face of evil, loyalty to Christ under pressure, and strength to defend those who cannot defend themselves. Amen.',
      bio: [
        'George is honored as a soldier and martyr who died during the persecution of Christians under the Roman emperor Diocletian, probably in the early fourth century. Reliable details of his life are scarce, but devotion to him spread rapidly through both Eastern and Western Christianity.',
        'The famous story of George slaying a dragon arose centuries later. Rather than a historical biography, it became a powerful image of Christian courage: the faithful soldier confronting evil, protecting the innocent, and refusing to worship false gods even under threat of death.'
      ]
    },
    {
      id: 'st_homobonus', name: 'St. Homobonus', shortName: 'Homobonus', acquired: false,
      medalText: 'After 3 encounters, gain 1 red, 1 white, and 1 black resource.',
      yearsOnEarth: '12th century-1197 (birth year uncertain)',
      patronages: 'Businesspeople; entrepreneurs; merchants; tailors; shoemakers; clothworkers; Cremona.',
      prayer: 'St. Homobonus, guard me from greed and dishonest shortcuts. Help me conduct my work with justice, generosity, and concern for every person affected by it. Amen.',
      bio: [
        'Homobonus was a twelfth-century cloth merchant from Cremona, Italy. A married layman rather than a priest or monk, he became known for honest business, generous almsgiving, care for the poor, devotion to the Cross, and efforts to reconcile neighbors divided by civic conflict.',
        'He died in 1197 while attending Mass and was canonized only two years later after the people of Cremona petitioned for his recognition. His life presents commerce as a field for holiness when profit is governed by justice, charity, and responsibility toward the community.'
      ]
    },
    {
      id: 'st_jerome', name: 'St. Jerome', shortName: 'Jerome', acquired: false,
      medalText: 'Whenever you gain aggression, gain 1 courage.',
      yearsOnEarth: 'c. 347-420',
      patronages: 'Translators; librarians; biblical scholars; students; archivists; archaeologists.',
      prayer: 'St. Jerome, pray that I may love Holy Scripture, study it with humility, and allow the word of God to correct and transform my life. Amen.',
      bio: [
        'Jerome was born around 347 in Dalmatia and received a classical education in Rome. After embracing an ascetic life, he studied Scripture and languages, served Pope Damasus, and eventually settled near Bethlehem, where he spent decades in scholarship, prayer, and spiritual direction.',
        'He is best known for producing the Latin biblical translation that became the foundation of the Vulgate. Jerome\'s fierce temperament sometimes appeared in his controversies, but his relentless devotion to the word of God made him one of the four great Latin Doctors of the Church.'
      ]
    },
    {
      id: 'st_joan_of_arc', name: 'St. Joan of Arc', shortName: 'Joan', acquired: true,
      medalText: 'Whenever you attack with your weapon, gain 1 might.',
      yearsOnEarth: 'c. 1412-1431',
      patronages: 'France; soldiers; prisoners and captives; those ridiculed for their faith; people facing unjust judgment.',
      prayer: 'If I am not in God\'s grace, may He put me there; if I am, may He keep me there.',

  let selectedId = null;

  function isTermBoundary(text, index) {
    if (index < 0 || index >= text.length) return true;
    const ch = text[index];
    return !/[a-z0-9]/i.test(ch);
  }

  function findKeywordMatches(text) {
    const matches = [];
    KEYWORD_DEFS.forEach((def, registryIndex) => {
      def.aliases.forEach(alias => {
        let start = 0;
        while (start < text.length) {
          const index = text.toLowerCase().indexOf(alias.toLowerCase(), start);
          if (index < 0) break;
          if (isTermBoundary(text, index - 1) && isTermBoundary(text, index + alias.length)) {
            matches.push({ index, registryIndex, def, alias, length: alias.length });
            break;
          }
          start = index + alias.length;
        }
      });
    });
    return matches.sort((a, b) => a.index - b.index || a.registryIndex - b.registryIndex);
  }

  function highlightKeywords(text) {
    const matches = findKeywordMatches(text);
    const used = new Set();
    if (matches.length === 0) {
      return { html: escapeHtml(text), usedIds: used };
    }

    let html = '';
    let cursor = 0;

    matches.forEach(match => {
      if (match.index < cursor) return;
      html += escapeHtml(text.slice(cursor, match.index));
      html += `<span class="kw">${escapeHtml(text.slice(match.index, match.index + match.length))}</span>`;
      cursor = match.index + match.length;
      used.add(match.def.id);
    });
    html += escapeHtml(text.slice(cursor));
    return { html, usedIds: used };
  }

  function buildKeywordBlocks(usedIds) {
    return KEYWORD_DEFS
      .filter(def => usedIds.has(def.id))
      .map(def => `<div class="keyword-block">${escapeHtml(def.tooltip)}</div>`)
      .join('');
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function medalIconHtml(medal) {
    if (!medal.acquired) {
      return '<span class="medal-locked-mark">?</span>';
    }
    const tex = MEDAL_TEXTURES[medal.id];
    if (tex) {
      return `<img src="${tex}" alt="${medal.name}">`;
    }
    return `<span class="medal-placeholder-label">${medal.shortName}</span>`;
  }

  function saintDetailHtml(medal) {
    const highlighted = highlightKeywords(medal.medalText);
    const keywordHtml = buildKeywordBlocks(highlighted.usedIds);

    return `
      <h3 class="saint-name">${escapeHtml(medal.name)}</h3>
      <div class="medal-effect-block">
        <p class="medal-effect-text">${highlighted.html}</p>
        ${keywordHtml ? `<div class="keyword-blocks">${keywordHtml}</div>` : ''}
      </div>
      <p class="saint-section-label">Years on Earth</p>
      <p class="saint-years">${escapeHtml(medal.yearsOnEarth)}</p>
      <p class="saint-bio">${escapeHtml(medal.bio[0])}</p>
      <p class="saint-bio">${escapeHtml(medal.bio[1])}</p>
      <p class="saint-section-label">Common patronages</p>
      <p class="saint-patronages">${escapeHtml(medal.patronages)}</p>
      <p class="saint-section-label">Associated prayer</p>
      <blockquote class="saint-prayer">${escapeHtml(medal.prayer)}</blockquote>
    `;
  }

  function selectMedal(id) {
    const medal = ALL_MEDALS.find(m => m.id === id);
    if (!medal || !medal.acquired) return;

    selectedId = id;
    document.querySelectorAll('.medal-tile').forEach(el => {
      el.classList.toggle('is-selected', el.dataset.id === id);
    });

    document.getElementById('detail-empty').style.display = 'none';
    const detail = document.getElementById('saint-detail');
    detail.classList.add('is-visible');
    detail.innerHTML = saintDetailHtml(medal);
  }

  function buildGrid() {
    const grid = document.getElementById('medal-grid');
    grid.innerHTML = '';

    ALL_MEDALS.forEach(medal => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'medal-tile' + (medal.acquired ? '' : ' is-locked');
      btn.dataset.id = medal.id;
      btn.disabled = !medal.acquired;
      btn.innerHTML = `
        <div class="medal-icon-wrap">${medalIconHtml(medal)}</div>
        <span class="medal-tile-label">${escapeHtml(medal.shortName)}</span>
      `;
      if (medal.acquired) {
        btn.addEventListener('click', () => selectMedal(medal.id));
      }
      grid.appendChild(btn);
    });
  }

  function updateMeter() {
    const acquired = ALL_MEDALS.filter(m => m.acquired).length;
    const pct = (acquired / TOTAL_MEDALS) * 100;
    document.getElementById('collection-fill').style.width = `${pct}%`;
    document.getElementById('collection-count').textContent = `${acquired} / ${TOTAL_MEDALS}`;
  }

  function fitViewport() {
    const scaler = document.querySelector('.viewport-scaler');
    const vp = document.querySelector('.viewport');
    if (!scaler || !vp) return;
    const scale = scaler.clientWidth / GAME_W;
    vp.style.transform = `translateX(-50%) scale(${scale})`;
    scaler.style.height = `${GAME_H * scale}px`;
  }

  buildGrid();
  updateMeter();
  selectMedal('st_augustine');

  window.addEventListener('resize', fitViewport);
  window.addEventListener('load', fitViewport);
  fitViewport();
</script>
